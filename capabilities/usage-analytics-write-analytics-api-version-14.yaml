naftiko: 1.0.0-alpha2
info:
  label: Coveo Usage Analytics Write API — Analytics API - Version 14
  description: 'Coveo Usage Analytics Write API — Analytics API - Version 14. 8 operations. Lead operation: Adds a Click Event
    via POST. Self-contained Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Usage Analytics Write
  - Analytics API - Version 14
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_SEARCH_TOKEN: COVEO_SEARCH_TOKEN
capability:
  consumes:
  - type: http
    namespace: usage-analytics-write-analytics-api-version-14
    baseUri: https://analytics.cloud.coveo.com/rest/ua
    description: Coveo Usage Analytics Write API — Analytics API - Version 14 business capability. Self-contained, no shared
      references.
    authentication:
      type: bearer
      token: '{{env.COVEO_SEARCH_TOKEN}}'
    resources:
    - name: v14-analytics-click
      path: /v14/analytics/click
      operations:
      - name: postv14analyticsclick
        method: POST
        description: Adds a Click Event via POST
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: visitor
          in: cookie
          type: string
          description: The unique identifier of the visitor. If not provided, a new identifier will be created and returned
            as a HTTP cookie.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v14-analytics-custom
      path: /v14/analytics/custom
      operations:
      - name: postv14analyticscustom
        method: POST
        description: Adds a Custom Event via POST
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: visitor
          in: cookie
          type: string
          description: The unique identifier of the visitor. If not provided, a new identifier will be created and returned
            as a HTTP cookie.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v14-analytics-monitoring-health
      path: /v14/analytics/monitoring/health
      operations:
      - name: getv14analyticsmonitoringhealth
        method: GET
        description: Health Check for the Analytics Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v14-analytics-search
      path: /v14/analytics/search
      operations:
      - name: postv14analyticssearch
        method: POST
        description: Adds a Search Event via POST
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: visitor
          in: cookie
          type: string
          description: The unique identifier of the visitor. If not provided, a new identifier will be created and returned
            as a HTTP cookie.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v14-analytics-searches
      path: /v14/analytics/searches
      operations:
      - name: postv14analyticssearches
        method: POST
        description: Adds Multiple Search Events via POST
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: visitor
          in: cookie
          type: string
          description: The unique identifier of the visitor. If not provided, a new identifier will be created and returned
            as a HTTP cookie.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v14-analytics-status
      path: /v14/analytics/status
      operations:
      - name: getv14analyticsstatus
        method: GET
        description: Gets the Status of the Analytics Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v14-analytics-visit
      path: /v14/analytics/visit
      operations:
      - name: getv14analyticsvisit
        method: GET
        description: Get the User Current Visit Informations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user
          in: query
          type: string
          description: The unique identifier of the user performing the search event. If not provided, the username will be
            extracted from the token.
        - name: visitor
          in: cookie
          type: string
          description: The unique identifier of the visitor. If not provided, a new identifier will be created and returned
            as a HTTP cookie.
      - name: deletev14analyticsvisit
        method: DELETE
        description: Clears All Cookies Associated with This API
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
