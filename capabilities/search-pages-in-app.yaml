naftiko: 1.0.0-alpha2
info:
  label: Coveo Search Pages API — In-App
  description: 'Coveo Search Pages API — In-App. 6 operations. Lead operation: Create InAppWidget. Self-contained Naftiko
    capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Search Pages
  - In-App
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_SEARCH_TOKEN: COVEO_SEARCH_TOKEN
capability:
