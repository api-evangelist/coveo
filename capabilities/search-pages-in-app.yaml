    resources:
    - name: rest-organizations-organizationID-pages-inappwidget
      path: /rest/organizations/{organizationID}/pages/inappwidget
      operations:
      - name: post
        method: POST
        description: Create InAppWidget
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationID
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185) (e.g., 'mycoveocloudv2organizationg8tp8wu3').
          required: true
        - name: body
          in: body
          type: string
          description: The configuration to use for the new InAppWidget.
          required: true
    - name: rest-organizations-organizationID-pages-inappwidget-pageID
      path: /rest/organizations/{organizationID}/pages/inappwidget/{pageID}
      operations:
