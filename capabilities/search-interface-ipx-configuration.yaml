        method: GET
        description: List All IPX Interface Configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createipxinterfaceconfig
        method: POST
        description: Create IPX Interface Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: createPipelines
          in: query
          type: boolean
          description: If true, pipelines, conditions and models will be created for the IPX interface.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
