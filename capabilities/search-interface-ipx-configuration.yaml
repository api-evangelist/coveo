naftiko: 1.0.0-alpha2
info:
  label: Coveo Search Interface Service API — IPX Configuration
  description: 'Coveo Search Interface Service API — IPX Configuration. 15 operations. Lead operation: List All IPX Interface
    Configurations. Self-contained Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Search Interface Service
  - IPX Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_SEARCH_TOKEN: COVEO_SEARCH_TOKEN
