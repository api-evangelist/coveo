      description: Send Events to Coveo Analytics.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: event-event-api.sendevents
      with:
        organizationId: tools.organizationId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: validate-coveo-api-requests
      description: Validate Coveo API Requests.
      hints:
        readOnly: true
        destructive: false
        idempotent: false
