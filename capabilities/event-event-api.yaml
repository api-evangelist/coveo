    namespace: event-event-api-rest
    port: 8080
    description: REST adapter for Coveo Event API — Event API. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/organizations/{organizationid}/events/v1
      name: rest-organizations-organizationid-events-v1
      description: REST surface for rest-organizations-organizationId-events-v1.
      operations:
      - method: POST
        name: sendevents
        description: Send Events to Coveo Analytics.
        call: event-event-api.sendevents
        with:
          organizationId: rest.organizationId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{organizationid}/events/v1/requests/validate
      name: rest-organizations-organizationid-events-v1-requests-validate
      description: REST surface for rest-organizations-organizationId-events-v1-requests-validate.
      operations:
      - method: POST
        name: validaterequest
        description: Validate Coveo API Requests.
        call: event-event-api.validaterequest
        with:
          organizationId: rest.organizationId
          type: rest.type
          version: rest.version
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{organizationid}/events/v1/validate
      name: rest-organizations-organizationid-events-v1-validate
      description: REST surface for rest-organizations-organizationId-events-v1-validate.
      operations:
      - method: POST
        name: validateevents
        description: Validate Events with Coveo Analytics.
        call: event-event-api.validateevents
