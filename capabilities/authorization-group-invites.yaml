        name: declineinvite
        description: Decline Invite to Group
        call: authorization-group-invites.declineinvite
        with:
          organizationId: rest.organizationId
          groupId: rest.groupId
          invite_code: rest.invite_code
        outputParameters:
        - type: object
          mapping: $.
