      operations:
      - name: querysuggestpostv3
        method: POST
        description: Request Query Suggestions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: rest-search-v3-text
      path: /rest/search/v3/text
      operations:
      - name: textv3
        method: GET
        description: Get Item in Text Format
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: primaryId
          in: query
          type: string
          description: The primary ID of the document.
        - name: uniqueId
