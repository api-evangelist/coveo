      name: rest-search-v3
      description: REST surface for rest-search-v3.
      operations:
      - method: POST
        name: searchusingpostv3
        description: Send Search Request
        call: search-search-v3.searchusingpostv3
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
