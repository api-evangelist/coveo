        description: Deletes a Search Hub for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: hubName
          in: path
          type: string
          description: The search hub name
          required: true
        - name: organizationId
          in: path
          type: string
          description: The organization ID
          required: true
      - name: getsearchhub
        method: GET
        description: Gets a Specific Search Hub for an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: hubName
          in: path
          type: string
          description: The search hub name
          required: true
        - name: organizationId
          in: path
          type: string
          description: The organization ID
          required: true
      - name: updatesearchhub
        method: PUT
        description: Updates a Search Hub in an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
