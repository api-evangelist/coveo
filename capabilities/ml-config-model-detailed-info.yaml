naftiko: 1.0.0-alpha2
info:
  label: Coveo Machine Learning Configuration API — Model Detailed Info
  description: 'Coveo Machine Learning Configuration API — Model Detailed Info. 1 operations. Lead operation: Fetch Model.
    Self-contained Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Machine Learning Configuration
  - Model Detailed Info
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_API_KEY: COVEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: ml-config-model-detailed-info
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Machine Learning Configuration API — Model Detailed Info business capability. Self-contained, no shared
      references.
    authentication:
      type: bearer
      token: '{{env.COVEO_API_KEY}}'
    resources:
    - name: rest-organizations-organizationId-machinelearning-configuration-modeldetailedinf
      path: /rest/organizations/{organizationId}/machinelearning/configuration/modeldetailedinfo/{modelId}
      operations:
      - name: getmodeldetailedinfo
        method: GET
        description: Fetch Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `mycoveocloudv2organizationg8tp8wu3`
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target machine learning model.<br />**Example:** `My_Model_ID`
          required: true
  exposes:
  - type: rest
    namespace: ml-config-model-detailed-info-rest
    port: 8080
    description: REST adapter for Coveo Machine Learning Configuration API — Model Detailed Info. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/organizations/{organizationid}/machinelearning/configuration/modeldetailedinfo/{modelid}
      name: rest-organizations-organizationid-machinelearning-configuration-modeldetailedinf
      description: REST surface for rest-organizations-organizationId-machinelearning-configuration-modeldetailedinf.
      operations:
      - method: GET
        name: getmodeldetailedinfo
        description: Fetch Model
        call: ml-config-model-detailed-info.getmodeldetailedinfo
        with:
          organizationId: rest.organizationId
          modelId: rest.modelId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: ml-config-model-detailed-info-mcp
    port: 9090
    transport: http
    description: MCP adapter for Coveo Machine Learning Configuration API — Model Detailed Info. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: fetch-model
      description: Fetch Model
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: ml-config-model-detailed-info.getmodeldetailedinfo
      with:
        organizationId: tools.organizationId
        modelId: tools.modelId
      outputParameters:
      - type: object
        mapping: $.
