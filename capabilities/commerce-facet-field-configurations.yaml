naftiko: 1.0.0-alpha2
info:
  label: Coveo Commerce API — Facet Field Configurations
  description: 'Coveo Commerce API — Facet Field Configurations. 3 operations. Lead operation: Retrieves All Facet Fields.
    Self-contained Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Commerce
  - Facet Field Configurations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_SEARCH_TOKEN: COVEO_SEARCH_TOKEN
capability:
  consumes:
  - type: http
    namespace: commerce-facet-field-configurations
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Commerce API — Facet Field Configurations business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_SEARCH_TOKEN}}'
    resources:
    - name: rest-organizations-organizationId-commerce-v2-tracking-ids-trackingId-facet-fiel
      path: /rest/organizations/{organizationId}/commerce/v2/tracking-ids/{trackingId}/facet/fields
      operations:
      - name: getall1
        method: GET
        description: Retrieves All Facet Fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `acmecorporation8tp8wu3`
          required: true
        - name: trackingId
          in: path
          type: string
          description: The unique identifier of the tracking target.
          required: true
        - name: page
          in: query
          type: integer
          description: The 0-based index number of the page to retrieve.
        - name: perPage
          in: query
          type: integer
          description: The number of items to return per page.
    - name: rest-organizations-organizationId-commerce-v2-tracking-ids-trackingId-facet-fiel
      path: /rest/organizations/{organizationId}/commerce/v2/tracking-ids/{trackingId}/facet/fields/bulk-create
      operations:
      - name: bulkcreate
        method: POST
        description: Creates Multiple Facet Fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `acmecorporation8tp8wu3`
          required: true
        - name: trackingId
          in: path
          type: string
          description: The unique identifier of the tracking target.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-organizations-organizationId-commerce-v2-tracking-ids-trackingId-facet-fiel
      path: /rest/organizations/{organizationId}/commerce/v2/tracking-ids/{trackingId}/facet/fields/bulk-update
      operations:
      - name: bulkupdate
        method: PUT
        description: Update Multiple Facet Fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `acmecorporation8tp8wu3`
          required: true
        - name: trackingId
          in: path
          type: string
          description: The unique identifier of the tracking target.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
