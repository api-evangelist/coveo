      path: /rest/organizations/{organizationId}/commerce/v2/tracking-ids/{trackingId}/facet/fields/bulk-update
      operations:
      - name: bulkupdate
        method: PUT
        description: Update Multiple Facet Fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
