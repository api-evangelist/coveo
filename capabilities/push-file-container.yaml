naftiko: 1.0.0-alpha2
info:
  label: Coveo Push API — File Container
  description: 'Coveo Push API — File Container. 1 operations. Lead operation: Create a File Container. Self-contained Naftiko
    capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Push
  - File Container
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_API_KEY: COVEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: push-file-container
    baseUri: https://api.cloud.coveo.com/push/v1
    description: Coveo Push API — File Container business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_API_KEY}}'
    resources:
    - name: organizations-organizationId-files
      path: /organizations/{organizationId}/files
      operations:
      - name: post
        method: POST
        description: Create a File Container
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: 'The unique identifier of the target Coveo Cloud V2 organization.  '
          required: true
        - name: useVirtualHostedStyleUrl
          in: query
          type: string
          description: 'Whether to generate the presigned URL using the virtual hosted-style URL.  '
  exposes:
  - type: rest
    namespace: push-file-container-rest
    port: 8080
    description: REST adapter for Coveo Push API — File Container. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/organizations/{organizationid}/files
      name: organizations-organizationid-files
      description: REST surface for organizations-organizationId-files.
      operations:
      - method: POST
        name: post
        description: Create a File Container
        call: push-file-container.post
        with:
          organizationId: rest.organizationId
          useVirtualHostedStyleUrl: rest.useVirtualHostedStyleUrl
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: push-file-container-mcp
    port: 9090
    transport: http
    description: MCP adapter for Coveo Push API — File Container. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-file-container
      description: Create a File Container
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: push-file-container.post
      with:
        organizationId: tools.organizationId
        useVirtualHostedStyleUrl: tools.useVirtualHostedStyleUrl
      outputParameters:
      - type: object
        mapping: $.
