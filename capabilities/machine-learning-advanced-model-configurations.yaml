naftiko: 1.0.0-alpha2
info:
  label: Coveo Machine Learning API — Advanced Model Configurations
  description: 'Coveo Machine Learning API — Advanced Model Configurations. 4 operations. Lead operation: List Advanced Registration
    Configuration Files for the Model. Self-contained Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Machine Learning
  - Advanced Model Configurations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_API_KEY: COVEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: machine-learning-advanced-model-configurations
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Machine Learning API — Advanced Model Configurations business capability. Self-contained, no shared
      references.
    authentication:
      type: bearer
      token: '{{env.COVEO_API_KEY}}'
    resources:
    - name: rest-organizations-organizationId-machinelearning-models-modelId-configs-status
      path: /rest/organizations/{organizationId}/machinelearning/models/{modelId}/configs/status
      operations:
      - name: getallconfigfilesstatus
        method: GET
        description: List Advanced Registration Configuration Files for the Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
    - name: rest-organizations-organizationId-machinelearning-models-modelId-configs-configu
      path: /rest/organizations/{organizationId}/machinelearning/models/{modelId}/configs/{configurationType}
      operations:
      - name: download
        method: GET
        description: Download the Specified Configuration File for the Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
        - name: configurationType
          in: path
          type: string
          description: The type of advanced configuration file.
          required: true
        - name: languageCode
          in: query
          type: string
          description: The language of the configuration file to retrieve. It must be an <a href="https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes">ISO
            639-1 code</a>, or the str
      - name: upload
        method: PUT
        description: 'Upload configuration file for the model. Maximum file size allowed: 10 MB.<br /><br /><details><summary>Privilege
          required</summary>'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
        - name: configurationType
          in: path
          type: string
          description: The type of advanced configuration file.
          required: true
        - name: languageCode
          in: query
          type: string
          description: The language of the configuration file to retrieve. It must be an <a href="https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes">ISO
            639-1 code</a>, or the str
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletefile
        method: DELETE
        description: Delete Configuration File for the Model.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
        - name: configurationType
          in: path
          type: string
          description: The type of advanced configuration file.
          required: true
