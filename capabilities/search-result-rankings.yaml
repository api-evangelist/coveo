naftiko: 1.0.0-alpha2
info:
  label: Coveo Search API — Result rankings
  description: 'Coveo Search API — Result rankings. 11 operations. Lead operation: Get a List of Result Ranking Rules. Self-contained
    Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Search
  - Result rankings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_SEARCH_TOKEN: COVEO_SEARCH_TOKEN
capability:
  consumes:
  - type: http
    namespace: search-result-rankings
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Search API — Result rankings business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_SEARCH_TOKEN}}'
    resources:
    - name: rest-search-v2-admin-pipelines-pipelineId-resultRankings
      path: /rest/search/v2/admin/pipelines/{pipelineId}/resultRankings
      operations:
      - name: listresultrankingrules
        method: GET
        description: Get a List of Result Ranking Rules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: kind
          in: query
          type: string
          description: The kind of result ranking rules to allow in the returned list (i.e., `featured_result` or `ranking_expression`).
        - name: enabledStatus
          in: query
          type: boolean
          description: The enabled status of result ranking rules to allow in the returned list.
        - name: statementGroupId
          in: query
          type: string
          description: The unique identifier of the statement group.
        - name: ruleStatuses
          in: query
          type: array
          description: 'The rule status to allow in the results. Available statuses are: "active", "inactive".'
        - name: ruleTypes
          in: query
          type: array
          description: The rule types to allow in the results. Available types are "featuredResults", "rankingExpressions".
        - name: associatedGroups
          in: query
          type: array
          description: The group names to allow in the results. Include the `null` value in the array to allow rules that
            are not associated with any groups (e.g., `[null, "mygroup"]`
        - name: expand
          in: query
          type: array
          description: The related resources to expand in the response.
      - name: createresultrankingrule
        method: POST
        description: Create a New Result Ranking Rule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-search-v2-admin-pipelines-pipelineId-resultRankings-bulkDelete
      path: /rest/search/v2/admin/pipelines/{pipelineId}/resultRankings/bulkDelete
      operations:
      - name: bulkdeleterankingrules
        method: POST
        description: Bulk Delete Result Rankings Rules from a Pipeline
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-search-v2-admin-pipelines-pipelineId-resultRankings-bulkGet
      path: /rest/search/v2/admin/pipelines/{pipelineId}/resultRankings/bulkGet
