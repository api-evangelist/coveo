          in: path
          type: string
          description: The unique identifier of a group.
          required: true
        - name: org
          in: query
          type: string
          description: The unique identifier of a user.
        - name: includeConfig
          in: query
          type: boolean
          description: Whether to include the detailed configuration of the report in the response.
