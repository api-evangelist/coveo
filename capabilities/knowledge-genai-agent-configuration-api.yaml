    description: Coveo Knowledge Generative AI API — Agent Configuration API business capability. Self-contained, no shared
      references.
    authentication:
      type: bearer
      token: '{{env.COVEO_SEARCH_TOKEN}}'
    resources:
    - name: api-preview-organizations-organizationId-agents
      path: /api/preview/organizations/{organizationId}/agents
      operations:
      - name: getbypage
        method: GET
        description: List Agents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          required: true
        - name: page
          in: query
          type: integer
          description: The zero-based index of the results page to retrieve
        - name: perPage
          in: query
          type: integer
          description: The number of items to return per page
      - name: create
        method: POST
        description: Create an Agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          required: true
        - name: X-Skip-Provisioning
          in: header
          type: boolean
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-preview-organizations-organizationId-agents-agentId
      path: /api/preview/organizations/{organizationId}/agents/{agentId}
      operations:
      - name: get
        method: GET
        description: Get an Agent by agentId
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          required: true
        - name: agentId
          in: path
          type: string
          required: true
      - name: delete
        method: DELETE
        description: Delete an Agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          required: true
        - name: agentId
          in: path
          type: string
          required: true
      - name: update
        method: PATCH
        description: Update an Agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          required: true
        - name: agentId
          in: path
          type: string
          required: true
        - name: X-Skip-Provisioning
          in: header
          type: boolean
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
