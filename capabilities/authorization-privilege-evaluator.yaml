naftiko: 1.0.0-alpha2
info:
  label: Coveo Authorization Server API — Privilege Evaluator
  description: 'Coveo Authorization Server API — Privilege Evaluator. 2 operations. Lead operation: Evaluate a Privilege Request.
    Self-contained Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Authorization Server
  - Privilege Evaluator
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_API_KEY: COVEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: authorization-privilege-evaluator
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Authorization Server API — Privilege Evaluator business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_API_KEY}}'
    resources:
    - name: rest-privilege-evaluate
      path: /rest/privilege/evaluate
      operations:
      - name: evaluate
        method: POST
        description: Evaluate a Privilege Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-privilege-evaluate-general-access
      path: /rest/privilege/evaluate/general-access
      operations:
      - name: evaluategeneralaccess
        method: POST
        description: Evaluate a Privilege Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: authorization-privilege-evaluator-rest
    port: 8080
    description: REST adapter for Coveo Authorization Server API — Privilege Evaluator. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/privilege/evaluate
      name: rest-privilege-evaluate
      description: REST surface for rest-privilege-evaluate.
      operations:
      - method: POST
        name: evaluate
        description: Evaluate a Privilege Request
        call: authorization-privilege-evaluator.evaluate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/privilege/evaluate/general-access
      name: rest-privilege-evaluate-general-access
      description: REST surface for rest-privilege-evaluate-general-access.
      operations:
      - method: POST
        name: evaluategeneralaccess
        description: Evaluate a Privilege Request
        call: authorization-privilege-evaluator.evaluategeneralaccess
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: authorization-privilege-evaluator-mcp
    port: 9090
    transport: http
    description: MCP adapter for Coveo Authorization Server API — Privilege Evaluator. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: evaluate-privilege-request
      description: Evaluate a Privilege Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: authorization-privilege-evaluator.evaluate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: evaluate-privilege-request-2
      description: Evaluate a Privilege Request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: authorization-privilege-evaluator.evaluategeneralaccess
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
