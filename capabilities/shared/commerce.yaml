          in: query
          type: string
          description: An ISO 639-1 language code.
          required: true
        - name: country
          in: query
          type: string
          description: An ISO 3166-1 alpha-2 country code.
          required: true
        - name: currency
          in: query
          type: string
          description: An ISO 4217 currency code.
          required: true
        - name: page
          in: query
          type: integer
          description: The page of products to request.
        - name: perPage
          in: query
          type: integer
          description: The number of products per page. Note that a value greater than 100 may be rejected in the future.
        - name: isEditingGlobal
          in: query
          type: boolean
          description: Whether the rule is for the global config.
        - name: debug
          in: query
          type: boolean
          description: Whether to include the execution report on a successful response.
      - name: previewimpactofupdatingrule
        method: PUT
        description: Preview the Impact of an Updated Listing Rule Vs Not Having the Rule, or If compareWithPreviousState
