        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `acmecorporation8tp8wu3`
          required: true
        - name: id
          in: path
          type: string
          description: The unique identifier of the rule.
          required: true
        - name: isEditingGlobal
          in: query
          type: boolean
          description: Whether the rule is for the global config.
        - name: compareWithPreviousState
          in: query
          type: boolean
          description: When previewing an update to a rule, whether to compare the preview results against those from one
            executed with the previous state of the rule, or against a on
        - name: body
          in: body
          type: object
          description: Request body (JSON).
