naftiko: 1.0.0-alpha2
info:
  label: Coveo Platform API
  description: Administrative endpoints for organizations, sources, fields, and tokens.
  tags:
  - Coveo
  - API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_API_KEY: COVEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform
    baseUri: https://platform.cloud.coveo.com/rest
    description: Coveo Platform API HTTP API.
    authentication:
      type: bearer
      token: '{{env.COVEO_API_KEY}}'
    resources:
    - name: rest-organizations-organizationId
      path: /rest/organizations/{organizationId}
      operations:
      - name: getorganization
        method: GET
        description: Show Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `mycoveocloudv2organizationg8tp8wu3`
          required: true
        - name: additionalFields
          in: query
          type: array
          description: A line-separated list of additional fields to include.</br>**Example:** `license`</br>`status`
      - name: updateorganization
        method: PUT
        description: Update Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `mycoveocloudv2organizationg8tp8wu3`
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
      - name: deleteorganization
        method: DELETE
        description: Delete Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `mycoveocloudv2organizationg8tp8wu3`
          required: true
    - name: rest-organizations-organizationId-crawlingmodule-crawlingModuleId
      path: /rest/organizations/{organizationId}/crawlingmodule/{crawlingModuleId}
      operations:
      - name: reportcrawlingmodule
        method: PUT
        description: Report Crawling Module Deployment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
