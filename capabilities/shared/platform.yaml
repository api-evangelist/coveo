      - name: setservingexperiment
        method: PUT
        description: Allow or Disallow Serving Experiments on the Organization. It Is Allowed by Default.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `mycoveocloudv2organizationg8tp8wu3`
          required: true
        - name: allowed
          in: query
          type: boolean
          description: Whether serving experiments are allowed
          required: true
