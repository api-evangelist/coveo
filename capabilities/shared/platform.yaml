          in: path
          type: string
          description: The unique identifier of the target crawling module.</br>**Example:** mycoveocloudv2organization76kcam-1e7c13e2-afe7-4510-bd00-cd5fd8ba9b0d
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
      - name: removecrawlingmodule
