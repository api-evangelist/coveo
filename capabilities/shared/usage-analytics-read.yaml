        inputParameters:
        - name: org
          in: query
          type: string
          description: The name of the organization (Coveo Cloud V2 only)
        - name: exportId
          in: path
          type: string
          description: The export's unique identifier.
          required: true
        - name: redirect
          in: query
          type: boolean
          description: "Whether to return a HTTP redirect to the actual file.\n\n Note: for technical reasons, setting this\
            \ parameter to true will yield an error when calling the endpoin"
      - name: deletev14exportsexportid
        method: DELETE
        description: Delete an Export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
