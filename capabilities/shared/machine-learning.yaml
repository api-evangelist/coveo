naftiko: 1.0.0-alpha2
info:
  label: Coveo Machine Learning API
  description: Manage ART, QS, PR, and DNE ML models on a Coveo organization.
  tags:
  - Coveo
  - API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_API_KEY: COVEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: machine-learning
    baseUri: https://platform.cloud.coveo.com/rest/organizations
    description: Coveo Machine Learning API HTTP API.
    authentication:
      type: bearer
      token: '{{env.COVEO_API_KEY}}'
    resources:
    - name: rest-organizations-organizationId-machinelearning-models-modelId
      path: /rest/organizations/{organizationId}/machinelearning/models/{modelId}
      operations:
      - name: getmodel
        method: GET
        description: View a Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
      - name: updatemodelinformationbyid
        method: PUT
        description: Update the Configuration of a Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
      - name: unregisterbyid
        method: DELETE
        description: Delete a Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
    - name: rest-organizations-organizationId-machinelearning-models-modelId-configs-configu
      path: /rest/organizations/{organizationId}/machinelearning/models/{modelId}/configs/{configurationType}
      operations:
      - name: download
        method: GET
        description: Download the Specified Configuration File for the Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
        - name: configurationType
          in: path
          type: string
          description: The type of advanced configuration file.
          required: true
        - name: languageCode
          in: query
          type: string
          description: The language of the configuration file to retrieve. It must be an <a href="https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes">ISO
            639-1 code</a>, or the str
      - name: upload
        method: PUT
        description: 'Upload configuration file for the model. Maximum file size allowed: 10 MB.<br /><br /><details><summary>Privilege
          required</summary>

          ```

          {"owner":"COVEO_ML","targetDomain":"MODELS","type":"EDIT","targetId":"*"}

          ```

          </details>'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
        - name: configurationType
          in: path
          type: string
          description: The type of advanced configuration file.
          required: true
        - name: languageCode
          in: query
          type: string
          description: The language of the configuration file to retrieve. It must be an <a href="https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes">ISO
            639-1 code</a>, or the str
        - name: body
          in: body
          type: object
          description: Request body (JSON).
      - name: deletefile
        method: DELETE
        description: Delete Configuration File for the Model.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
        - name: configurationType
          in: path
          type: string
          description: The type of advanced configuration file.
          required: true
        - name: languageCode
          in: query
          type: string
          description: The language of the configuration file to retrieve. Only required when the specified modelConfigFileType
            is language-specific (e.g., STOPWORDS), and ignored oth
    - name: rest-organizations-organizationId-machinelearning-model
      path: /rest/organizations/{organizationId}/machinelearning/model
      operations:
      - name: register
        method: POST
        description: Create a New Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
    - name: rest-organizations-organizationId-machinelearning-streaming-streamId
      path: /rest/organizations/{organizationId}/machinelearning/streaming/{streamId}
      operations:
      - name: getquerystreamevents
        method: GET
        description: Get Model Response Events for a Query Stream
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: streamId
          in: path
          type: string
          description: Unique Identifier for the response stream. For details on how to obtain the streamId for this response,
            refer to [Streaming model responses](https://docs.coveo.
          required: true
    - name: rest-organizations-organizationId-machinelearning-models
      path: /rest/organizations/{organizationId}/machinelearning/models
      operations:
      - name: listmodels
        method: GET
        description: List All Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: engines
          in: query
          type: array
          description: A list of engine ids
    - name: rest-organizations-organizationId-machinelearning-models-modelId-details
      path: /rest/organizations/{organizationId}/machinelearning/models/{modelId}/details
      operations:
      - name: getmodeldetailsbyid
        method: GET
        description: 'Get detailed information about a specific model<br /><br /><details><summary>Privilege required</summary>

          ```

          {"owner":"COVEO_ML","targetDomain":"MODELS","type":"VIEW","targetId":"*"}

          ```

          </details>'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
    - name: rest-organizations-organizationId-machinelearning-models-modelId-configs-status
      path: /rest/organizations/{organizationId}/machinelearning/models/{modelId}/configs/status
      operations:
      - name: getallconfigfilesstatus
        method: GET
        description: List Advanced Registration Configuration Files for the Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: modelId
          in: path
          type: string
          description: The unique identifier of the target model
          required: true
    - name: rest-organizations-organizationId-machinelearning-models-details
      path: /rest/organizations/{organizationId}/machinelearning/models/details
      operations:
      - name: listmodelswithdetails
        method: GET
        description: Get Detailed Information About All Models
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
    - name: rest-organizations-organizationId-machinelearning-engines-engineId-models-modelN
      path: /rest/organizations/{organizationId}/machinelearning/engines/{engineId}/models/{modelName}
      operations:
      - name: unregister
        method: DELETE
        description: Delete a Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target Coveo Cloud organization
          required: true
        - name: engineId
          in: path
          type: string
          description: The id of the engine
          required: true
        - name: modelName
          in: path
          type: string
          description: The model name
          required: true
