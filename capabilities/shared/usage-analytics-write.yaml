        method: POST
        description: Adds a Click Event via POST
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: visitor
          in: cookie
          type: string
          description: The unique identifier of the visitor. If not provided, a new identifier will be created and returned
            as a HTTP cookie.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
