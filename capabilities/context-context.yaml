naftiko: 1.0.0-alpha2
info:
  label: Coveo Context API — Context
  description: 'Coveo Context API — Context. 1 operations. Lead operation: Get a Client''s Action History in Legacy Format.
    Self-contained Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Context
  - Context
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_SEARCH_TOKEN: COVEO_SEARCH_TOKEN
capability:
  consumes:
  - type: http
    namespace: context-context
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Context API — Context business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_SEARCH_TOKEN}}'
    resources:
    - name: rest-organizations-organizationId-machinelearning-user-actions
      path: /rest/organizations/{organizationId}/machinelearning/user/actions
      operations:
      - name: legacyactionhistory
        method: POST
        description: Get a Client's Action History in Legacy Format
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: context-context-rest
    port: 8080
    description: REST adapter for Coveo Context API — Context. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/organizations/{organizationid}/machinelearning/user/actions
      name: rest-organizations-organizationid-machinelearning-user-actions
      description: REST surface for rest-organizations-organizationId-machinelearning-user-actions.
      operations:
      - method: POST
        name: legacyactionhistory
        description: Get a Client's Action History in Legacy Format
        call: context-context.legacyactionhistory
        with:
          organizationId: rest.organizationId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: context-context-mcp
    port: 9090
    transport: http
    description: MCP adapter for Coveo Context API — Context. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-client-s-action-history-legacy
      description: Get a Client's Action History in Legacy Format
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: context-context.legacyactionhistory
      with:
        organizationId: tools.organizationId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
