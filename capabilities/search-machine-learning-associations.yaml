naftiko: 1.0.0-alpha2
info:
  label: Coveo Search API — Machine learning associations
  description: 'Coveo Search API — Machine learning associations. 10 operations. Lead operation: Returns the Version of ML
    Models Supported by the Organization in the Request.. Self-contained Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Search
  - Machine learning associations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
