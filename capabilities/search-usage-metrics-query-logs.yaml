        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: to
          in: query
          type: string
          description: The last day to retrieve
          required: true
        - name: from
          in: query
          type: string
          description: The first day to retrieve
          required: true
        - name: hubName
          in: query
          type: string
          description: The search hub name
          required: true
