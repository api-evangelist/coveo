    description: REST adapter for Coveo Machine Learning Configuration API — Relevance Generative Answering Configuration.
      One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/organizations/{organizationid}/machinelearning/configuration/rga/preview
      name: rest-organizations-organizationid-machinelearning-configuration-rga-preview
