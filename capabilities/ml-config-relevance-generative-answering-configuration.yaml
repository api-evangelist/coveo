naftiko: 1.0.0-alpha2
info:
  label: Coveo Machine Learning Configuration API — Relevance Generative Answering Configuration
  description: 'Coveo Machine Learning Configuration API — Relevance Generative Answering Configuration. 1 operations. Lead
    operation: Get Preview for Building an RGA Model. Self-contained Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Machine Learning Configuration
  - Relevance Generative Answering Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_API_KEY: COVEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: ml-config-relevance-generative-answering-configuration
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Machine Learning Configuration API — Relevance Generative Answering Configuration business capability.
      Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_API_KEY}}'
    resources:
    - name: rest-organizations-organizationId-machinelearning-configuration-rga-preview
      path: /rest/organizations/{organizationId}/machinelearning/configuration/rga/preview
      operations:
      - name: getrelevancegenerativeansweringpreview
        method: POST
        description: Get Preview for Building an RGA Model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `mycoveocloudv2organizationg8tp8wu3`
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
