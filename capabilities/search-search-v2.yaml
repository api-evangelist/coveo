naftiko: 1.0.0-alpha2
info:
  label: Coveo Search API — Search V2
  description: 'Coveo Search API — Search V2. 23 operations. Lead operation: Send Search Request. Self-contained Naftiko capability
    covering one Coveo business surface.'
  tags:
  - Coveo
  - Search
  - Search V2
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_SEARCH_TOKEN: COVEO_SEARCH_TOKEN
capability:
  consumes:
  - type: http
    namespace: search-search-v2
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Search API — Search V2 business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_SEARCH_TOKEN}}'
    resources:
    - name: rest-search-v2
      path: /rest/search/v2
      operations:
      - name: searchusingget
        method: GET
        description: Send Search Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchusingpost
        method: POST
        description: Send Search Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: rest-search-v2-datastream
      path: /rest/search/v2/datastream
      operations:
      - name: datastream
        method: GET
        description: Get Item Data Stream
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dataStream
          in: query
          type: string
          description: The name of the data stream to request.
          required: true
        - name: primaryId
          in: query
          type: string
          description: The primaryId of the document. Exactly one of uniqueId or primaryId is required.
        - name: uniqueId
          in: query
          type: string
          description: The uniqueId of the document. Exactly one of uniqueId or primaryId is required.
        - name: contentType
          in: query
          type: string
          description: The MIME type of the data stream to request.
    - name: rest-search-v2-document
      path: /rest/search/v2/document
      operations:
      - name: document
        method: GET
        description: Get Item in JSON Format
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: primaryId
          in: query
          type: string
          description: The primaryId of the document. Exactly one of uniqueId or primaryId is required.
        - name: uniqueId
          in: query
          type: string
          description: The uniqueId of the document. Exactly one of uniqueId or primaryId is required.
    - name: rest-search-v2-extensions
      path: /rest/search/v2/extensions
      operations:
      - name: extensions
        method: GET
        description: List Available Query Extensions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rest-search-v2-facet
      path: /rest/search/v2/facet
      operations:
      - name: facetsearch
        method: POST
        description: Send Facet Search Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-search-v2-fields
      path: /rest/search/v2/fields
      operations:
      - name: fields
        method: GET
        description: List All Fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rest-search-v2-fields-find
      path: /rest/search/v2/fields/find
      operations:
      - name: findfieldsfromexpression
        method: POST
        description: Find Fields from Results of a Query Expression
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: rest-search-v2-html
      path: /rest/search/v2/html
      operations:
      - name: htmlget
        method: GET
        description: Get HTML Item Preview
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: uniqueId
          in: query
          type: string
          description: The uniqueId of the document. Exactly one of uniqueId or primaryId is required.
        - name: primaryId
          in: query
          type: string
          description: The primaryId of the document. Exactly one of uniqueId or primaryId is required.
        - name: findNext
          in: query
          type: integer
        - name: findPrevious
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: enableNavigation
          in: query
          type: boolean
        - name: requestedOutputSize
          in: query
          type: integer
          description: The approximate number of bytes to request in the HTML response. **Default:** `0`, meaning that the
            entire HTML document is requested.
      - name: htmlpost
        method: POST
        description: Get HTML Item Preview
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: uniqueId
          in: query
          type: string
          description: The unique ID of the document.
          required: true
        - name: findNext
          in: query
          type: integer
        - name: findPrevious
          in: query
          type: integer
        - name: page
          in: query
          type: integer
        - name: enableNavigation
          in: query
          type: boolean
        - name: requestedOutputSize
          in: query
          type: integer
          description: The approximate number of bytes to request in the HTML response. **Default:** `0`, meaning that the
            entire HTML document is requested.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-search-v2-login-provider
      path: /rest/search/v2/login/{provider}
      operations:
      - name: login
        method: GET
        description: Log in to Authentication Provider
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: provider
          in: path
          type: string
          description: The name of the Search API authentication provider to log in to.
          required: true
      - name: loginproviderpost
        method: POST
        description: Log in to Authentication Provider
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: provider
          in: path
          type: string
          description: The name of the Search API authentication provider to log in to.
          required: true
    - name: rest-search-v2-plan
      path: /rest/search/v2/plan
      operations:
      - name: plansearchusingget
        method: GET
        description: Plan Search Execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: plansearchusingpost
        method: POST
        description: Plan Search Execution
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: rest-search-v2-querySuggest
      path: /rest/search/v2/querySuggest
      operations:
      - name: querysuggestget
        method: GET
        description: Request Query Suggestions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: q
          in: query
          type: string
          description: The *basic query* expression, typically the keywords entered by the end user in a query box.
        - name: autoCompleter
          in: query
          type: string
          description: This parameter is exposed for backward compatibility reasons.
        - name: additionalData
          in: query
          type: string
          description: This parameter is exposed for backward compatibility reasons.
        - name: count
          in: query
          type: integer
          description: The desired number of query suggestions.
        - name: enableWordCompletion
          in: query
          type: boolean
          description: Whether to attempt to complete the last word of the current basic query expression (see the `q` parameter)
            and boost the ranking score of the resulting expressi
      - name: querysuggestpost
        method: POST
        description: Request Query Suggestions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: rest-search-v2-rating
      path: /rest/search/v2/rating
      operations:
      - name: rating
        method: POST
        description: Update User Rating
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: rating
          in: query
          type: string
          description: The rate to be updated.
          required: true
        - name: uniqueId
          in: query
          type: string
          description: The unique ID of the document.
          required: true
    - name: rest-search-v2-text
      path: /rest/search/v2/text
      operations:
      - name: text
        method: GET
        description: Get Item in Text Format
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: primaryId
          in: query
          type: string
          description: The primaryId of the document. Exactly one of uniqueId or primaryId is required.
        - name: uniqueId
          in: query
          type: string
          description: The uniqueId of the document. Exactly one of uniqueId or primaryId is required.
    - name: rest-search-v2-token
      path: /rest/search/v2/token
      operations:
      - name: token
        method: POST
        description: Create Search Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-search-v2-values
      path: /rest/search/v2/values
      operations:
      - name: valuesget
        method: GET
        description: Get Values for One Field
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: field
          in: query
          type: string
          description: The name of the field from which to retrieve values.
          required: true
        - name: lookupField
          in: query
          type: string
          description: This parameter is exposed for backward compatibility reasons.
        - name: ignoreAccents
          in: query
          type: boolean
          description: Whether to treat accentuated characters as non-accentuated characters when retrieving field values
            (e.g., treat `é`, `è`, `ê`, etc., as `e`).
        - name: sortCriteria
          in: query
          type: string
          description: The sort criteria to use.
        - name: maximumNumberOfValues
          in: query
          type: integer
          description: The maximum number of field values to return.
        - name: queryOverride
          in: query
          type: string
          description: A different basic query expression (q) use.
        - name: constantQueryOverride
          in: query
          type: string
          description: A different constant query expression (cq) to use.
        - name: disjunctionQueryOverride
          in: query
          type: string
          description: A different disjunction query expression (dq) to use.
        - name: pattern
          in: query
          type: string
          description: The pattern that the field values must match.
        - name: patternType
          in: query
          type: string
          description: The type of pattern that is being used to list field values.
      - name: valuespost
        method: POST
        description: Get Values for One Field
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-search-v2-values-batch
      path: /rest/search/v2/values/batch
      operations:
      - name: valuesbatchget
        method: GET
        description: Get Values for Several Field
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: batch
          in: query
          type: string
          description: An array of parameters to retrieve field values.
          required: true
      - name: valuesbatchpost
        method: POST
        description: Get Values for Several Field
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
