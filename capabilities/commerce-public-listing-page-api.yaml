naftiko: 1.0.0-alpha2
info:
  label: Coveo Commerce API — Public Listing Page API
  description: 'Coveo Commerce API — Public Listing Page API. 4 operations. Lead operation: Retrieves All Listing Pages and
    Their Page Rules for a Tracking ID Within an Organization. Self-contained Naftiko capability covering one Coveo business
    surface.'
  tags:
  - Coveo
  - Commerce
  - Public Listing Page API
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_SEARCH_TOKEN: COVEO_SEARCH_TOKEN
capability:
  consumes:
  - type: http
    namespace: commerce-public-listing-page-api
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Commerce API — Public Listing Page API business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_SEARCH_TOKEN}}'
    resources:
    - name: rest-organizations-organizationId-commerce-v2-listings-pages
      path: /rest/organizations/{organizationId}/commerce/v2/listings/pages
      operations:
      - name: getall2
        method: GET
        description: Retrieves All Listing Pages and Their Page Rules for a Tracking ID Within an Organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `acmecorporation8tp8wu3`
          required: true
        - name: trackingId
          in: query
          type: string
          description: The unique identifier of the tracking target.
          required: true
        - name: page
          in: query
          type: integer
          description: The 0-based index number of the page of listing configurations to retrieve.</br>**Minimum:** `0`</br>**Default:**
            `0`
        - name: perPage
          in: query
          type: integer
          description: The number of listing configurations to list per page.</br>**Minimum:** `1`</br>**Maximum:** `1000`</br>**Default:**
            `10`
        - name: filter
          in: query
          type: string
          description: A filter expressed in JSON logic format.
    - name: rest-organizations-organizationId-commerce-v2-listings-pages-bulk-create
      path: /rest/organizations/{organizationId}/commerce/v2/listings/pages/bulk-create
      operations:
      - name: bulkcreate1
        method: POST
        description: Create Multiple Listing Pages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `acmecorporation8tp8wu3`
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-organizations-organizationId-commerce-v2-listings-pages-bulk-delete
      path: /rest/organizations/{organizationId}/commerce/v2/listings/pages/bulk-delete
      operations:
      - name: bulkdelete
        method: POST
        description: Delete Multiple Listing Pages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `acmecorporation8tp8wu3`
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: rest-organizations-organizationId-commerce-v2-listings-pages-bulk-update
      path: /rest/organizations/{organizationId}/commerce/v2/listings/pages/bulk-update
      operations:
      - name: bulkupdate1
        method: PUT
        description: Update Multiple Listing Pages
        outputRawFormat: json
        outputParameters:
