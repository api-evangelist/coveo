        description: Delete Group
        call: authorization-groups.deletegroup
        with:
          organizationId: rest.organizationId
          groupId: rest.groupId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/organizations/{organizationid}/groups/{groupid}/privileges/exclusive/me
