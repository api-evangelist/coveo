      path: /rest/organizations/{organizationId}/groups/{groupId}/privileges/exclusive/me
      operations:
      - name: getgroupexclusiveprivileges
        method: GET
        description: List Privileges Granted by Group to Current User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `mycoveocloudv2organizationg8tp8wu3`
          required: true
        - name: groupId
          in: path
