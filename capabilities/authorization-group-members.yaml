        - name: username
          in: path
          type: string
          description: The username of the [member](https://docs.coveo.com/en/2873/) to show.</br>**Example:** `jsmith@email.com-google`
          required: true
      - name: deletegroupmember
        method: DELETE
        description: Delete User
        outputRawFormat: json
        outputParameters:
