naftiko: 1.0.0-alpha2
info:
  label: Coveo Usage Analytics Read API — Reader Account API - Version 15
  description: 'Coveo Usage Analytics Read API — Reader Account API - Version 15. 13 operations. Lead operation: Get the Amount
    of Compute Credits Used by a Snowflake Reader Account Within a Date Range. Self-contained Naftiko capability covering
    one Coveo business surface.'
  tags:
  - Coveo
  - Usage Analytics Read
  - Reader Account API - Version 15
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_API_KEY: COVEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: usage-analytics-read-reader-account-api-version-15
    baseUri: https://analytics.cloud.coveo.com/rest/ua
    description: Coveo Usage Analytics Read API — Reader Account API - Version 15 business capability. Self-contained, no
      shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_API_KEY}}'
    resources:
    - name: v15-admin-snowflake-creditusage
      path: /v15/admin/snowflake/creditusage
      operations:
      - name: getv15adminsnowflakecreditusage
        method: GET
        description: Get the Amount of Compute Credits Used by a Snowflake Reader Account Within a Date Range
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org
          in: query
          type: string
          description: The name of the organization (Coveo Cloud V2 only)
        - name: from
          in: query
          type: string
          description: The beginning date of the date range. ISO8601 format 'YYYY-MM-DDThh:mm:ss.sssZ'
          required: true
        - name: to
          in: query
          type: string
          description: The end date of the date range. ISO8601 format 'YYYY-MM-DDThh:mm:ss.sssZ'
          required: true
    - name: v15-admin-snowflake-networkpolicy
      path: /v15/admin/snowflake/networkpolicy
      operations:
      - name: getv15adminsnowflakenetworkpolicy
        method: GET
        description: Get the Details of the Active Network Policy for a Snowflake Reader Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org
          in: query
          type: string
          description: The name of the organization (Coveo Cloud V2 only)
      - name: putv15adminsnowflakenetworkpolicy
        method: PUT
        description: Set the Details of the Active Network Policy for a Snowflake Reader Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org
          in: query
          type: string
          description: The name of the organization (Coveo Cloud V2 only)
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v15-admin-snowflake-readeraccount
      path: /v15/admin/snowflake/readeraccount
      operations:
      - name: getv15adminsnowflakereaderaccount
        method: GET
        description: Retrieve Snowflake Reader Account State
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
