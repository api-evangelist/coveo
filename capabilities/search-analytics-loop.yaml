naftiko: 1.0.0-alpha2
info:
  label: Coveo AI Search and Analytics Loop
  description: Composed capability that issues queries against the Coveo Search API, records search/click usage events via
    the Usage Analytics Write API, reads back usage data via the Usage Analytics Read API, and pushes documents into a Coveo
    Push source — covering the search → measure → improve loop that powers Coveo Machine Learning.
  tags:
  - Coveo
  - Search
  - Analytics
  - Push
  - ML
  - Workflow
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_SEARCH_TOKEN: COVEO_SEARCH_TOKEN
    COVEO_API_KEY: COVEO_API_KEY
capability:
  imports:
  - location: shared/search.yaml
  - location: shared/push.yaml
  - location: shared/usage-analytics-read.yaml
  - location: shared/usage-analytics-write.yaml
  - location: shared/machine-learning.yaml
  exposes:
  - type: mcp
    namespace: coveo
    tools:
    - name: search-query
      uses: search.searchUsingPost
    - name: record-search-event
      uses: usage-analytics-write.postSearchEvent
    - name: record-click-event
      uses: usage-analytics-write.postClickEvent
    - name: read-usage-events
      uses: usage-analytics-read.getEvents
    - name: push-document
      uses: push.pushDocument
    - name: list-ml-models
      uses: machine-learning.listModelDetails
