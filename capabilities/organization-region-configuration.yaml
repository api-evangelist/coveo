naftiko: 1.0.0-alpha2
info:
  label: Coveo Organization API — Region Configuration
  description: 'Coveo Organization API — Region Configuration. 2 operations. Lead operation: List Region Configurations. Self-contained
    Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Organization
  - Region Configuration
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_API_KEY: COVEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: organization-region-configuration
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Organization API — Region Configuration business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_API_KEY}}'
    resources:
    - name: rest-global-regions
      path: /rest/global/regions
      operations:
      - name: getallregionconfigurations
        method: GET
        description: List Region Configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: rest-global-regions-region
      path: /rest/global/regions/{region}
      operations:
      - name: getregionconfiguration
        method: GET
        description: Show Region Configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: region
          in: path
          type: string
          required: true
  exposes:
  - type: rest
    namespace: organization-region-configuration-rest
    port: 8080
    description: REST adapter for Coveo Organization API — Region Configuration. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/global/regions
      name: rest-global-regions
      description: REST surface for rest-global-regions.
      operations:
      - method: GET
        name: getallregionconfigurations
        description: List Region Configurations
        call: organization-region-configuration.getallregionconfigurations
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/global/regions/{region}
      name: rest-global-regions-region
      description: REST surface for rest-global-regions-region.
      operations:
      - method: GET
        name: getregionconfiguration
        description: Show Region Configuration
        call: organization-region-configuration.getregionconfiguration
        with:
          region: rest.region
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: organization-region-configuration-mcp
    port: 9090
    transport: http
    description: MCP adapter for Coveo Organization API — Region Configuration. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-region-configurations
      description: List Region Configurations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: organization-region-configuration.getallregionconfigurations
      outputParameters:
      - type: object
        mapping: $.
    - name: show-region-configuration
      description: Show Region Configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: organization-region-configuration.getregionconfiguration
      with:
        region: tools.region
      outputParameters:
      - type: object
        mapping: $.
