naftiko: 1.0.0-alpha2
info:
  label: Coveo Authorization Server API — Built-in Groups
  description: 'Coveo Authorization Server API — Built-in Groups. 1 operations. Lead operation: List Built-in Groups. Self-contained
    Naftiko capability covering one Coveo business surface.'
  tags:
  - Coveo
  - Authorization Server
  - Built-in Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COVEO_API_KEY: COVEO_API_KEY
capability:
  consumes:
  - type: http
    namespace: authorization-built-in-groups
    baseUri: https://platform.cloud.coveo.com
    description: Coveo Authorization Server API — Built-in Groups business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.COVEO_API_KEY}}'
    resources:
    - name: rest-organizations-organizationId-defaultgroups
      path: /rest/organizations/{organizationId}/defaultgroups
      operations:
      - name: getdefaultgroups
        method: GET
        description: List Built-in Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: organizationId
          in: path
          type: string
          description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
            `mycoveocloudv2organizationg8tp8wu3`
          required: true
  exposes:
  - type: rest
    namespace: authorization-built-in-groups-rest
    port: 8080
    description: REST adapter for Coveo Authorization Server API — Built-in Groups. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/organizations/{organizationid}/defaultgroups
      name: rest-organizations-organizationid-defaultgroups
      description: REST surface for rest-organizations-organizationId-defaultgroups.
      operations:
      - method: GET
        name: getdefaultgroups
        description: List Built-in Groups
        call: authorization-built-in-groups.getdefaultgroups
        with:
          organizationId: rest.organizationId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: authorization-built-in-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Coveo Authorization Server API — Built-in Groups. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: list-built-groups
      description: List Built-in Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: authorization-built-in-groups.getdefaultgroups
      with:
        organizationId: tools.organizationId
      outputParameters:
      - type: object
        mapping: $.
