aid: coveo
name: Coveo
kind: company
description: Coveo is a cloud-based AI-relevance platform that delivers personalized search, recommendations, and discovery
  experiences across digital workplaces, customer service portals, websites, and commerce storefronts. The Coveo platform
  exposes a family of REST APIs covering search, content indexing (Push and Stream), usage analytics, machine learning, commerce,
  and platform administration.
