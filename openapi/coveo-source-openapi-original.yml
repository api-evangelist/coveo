        lastUpdatedDate:
          type: string
          description: The date of the last permission model refresh in number of milliseconds since UNIX epoch.</br>**Example:**
            `1539703378000`
          format: date-time
        state:
          type: string
          description: 'The state of the item permission model.</br>**Allowed values:**</br> - `VALID`: Permission model updated.
            All identities in the permission model are valid and up to date.</br> - `PENDING`: Permission model not updated
            yet.</br> - `INCOMPLETE`: Permission model updated, but at least one allowed identity is not up to date, or at
            least one permission level (except level 0) contains at least one denied identity that was not successfully updated.</br>
            - `IN_ERROR`: Permission model updated. However, permission level 0 contains at least one denied identity that
            was not successfully updated.</br> - `WARNING`: The permission model has been updated, but at least one denied
            entity is out of date. The Denied effective permission list may therefore be incomplete. This issue requires immediate
            attention, as it can cause a security hole.</br> - `UNKNOWN`: The state of the permission model is unknown.<br
            />'
          enum:
          - UNKNOWN
          - VALID
          - PENDING
          - INCOMPLETE
          - IN_ERROR
          - WARNING
        permissionLevels:
          type: array
          description: The [permission levels](https://docs.coveo.com/en/225/).
          items:
            $ref: '#/components/schemas/PermissionLevelModel'
        permissionModelStateRootCauseModel:
          $ref: '#/components/schemas/PermissionModelStateRootCauseModel'
