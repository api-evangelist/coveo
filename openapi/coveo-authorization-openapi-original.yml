    ApiKeyRotationRequest:
      required:
      - rotationSecret
      type: object
      properties:
        previousKeyExpirationPeriod:
          type: string
          description: Specifies the expiration period for the previous API key after rotation. If the previous key already
            has an expiration date, you may only reduce (not extend) its remaining validity. If the previous key has an expiration
            date longer than the maximum allowed duration of 30 days, it will be reduced to 30 days. If the previous key does
            not have an expiration, you can set a duration up to a maximum of 30 days. Providing a duration longer than 30
            days will result in an exception. The value must be in ISO 8601 duration format (e.g., 'P14D' for 14 days).
