        sourceId:
          minLength: 1
          type: string
          description: A source containing the product content of the catalog
          example: acmecorporation8tp8wu3-qwpdaajjq3ahak5wlq7adhciuq
        availabilitySourceId:
          type: string
          description: A source containing the availability objects for the catalog
          example: acmecorporation8tp8wu3-wj6vgp4x7ov6mfaw5a0w3dnve
        catalogConfigurationId:
          type: string
          description: The unique identifier of the catalog configuration.
          format: uuid
          example: 644e1dd7-2a7f-18fb-b8ed-ed78c3f92c2b
        projectIds:
          type: array
          description: The list of project ids associated with the catalog.
          items:
            type: string
            description: The list of project ids associated with the catalog.
      description: The retrieved page of items.
    CommercePageModelCatalogModel:
      required:
      - items
      - totalEntries
      - totalPages
      type: object
      properties:
        items:
          type: array
          description: The retrieved page of items.
          items:
            $ref: '#/components/schemas/CatalogModel'
        totalEntries:
          type: integer
          description: The total number of results that match the query.
          format: int64
        totalPages:
          type: integer
          description: The total number of pages of items available.
          format: int32
      description: Page
    ProductHierarchyModel:
      required:
      - idField
      - objectType
      type: object
      properties:
        objectType:
          maxLength: 255
          minLength: 1
          type: string
          description: The `objecttype` [field](https://docs.coveo.com/200/) value that marks an indexed [item](https://docs.coveo.com/210/)
            as a representation of a _product_ in the catalog.
          example: Product
        idField:
          maxLength: 255
          minLength: 1
          type: string
          description: The name of a [field](https://docs.coveo.com/200/) that provides a unique identifier for each indexed
            [item](https://docs.coveo.com/210/) marked as a representation of a _product_ in the catalog.
          example: productid
        fields:
          uniqueItems: true
          type: array
          description: The [fields](https://docs.coveo.com/200/) that only seen on _products_ objects in the catalog.
          example:
          - color
          - size
          items:
            type: string
            description: The [fields](https://docs.coveo.com/200/) that only seen on _products_ objects in the catalog.
            example: '["color","size"]'
      description: '[Deprecated - use `configuration.product` instead]. The configuration that allows indexed [items](https://docs.coveo.com/210/)representing
        distinct _products_ in the catalog to be identified as such.'
    VariantHierarchyModel:
      required:
      - idField
      - objectType
      type: object
      properties:
        objectType:
          maxLength: 255
          minLength: 1
          type: string
          description: The `objecttype` [field](https://docs.coveo.com/200/) value that marks an indexed [item](https://docs.coveo.com/210/)
            as a representation of a _variant_ in the catalog.
          example: Variant
        idField:
          maxLength: 255
          minLength: 1
          pattern: '[a-z][a-z0-9_]*'
          type: string
          description: The name of a [field](https://docs.coveo.com/200/) that provides a unique identifier for each indexed
            [item](https://docs.coveo.com/210/) marked as a representation of a _variant_ in the catalog.
          example: sku
        fields:
          uniqueItems: true
          type: array
          description: The [fields](https://docs.coveo.com/200/) that are folded when performing a [nested query](https://docs.coveo.com/220/)
            for _variants_. In a [search interface](https://docs.coveo.com/2741/), a [facet](https://docs.coveo.com/198/)
            based on any of those fields transforms its [`aq`](https://docs.coveo.com/175/) override to match _variants_ rather
            than _products_.
          example:
          - color
          - size
          items:
            type: string
            description: The [fields](https://docs.coveo.com/200/) that are folded when performing a [nested query](https://docs.coveo.com/220/)
              for _variants_. In a [search interface](https://docs.coveo.com/2741/), a [facet](https://docs.coveo.com/198/)
              based on any of those fields transforms its [`aq`](https://docs.coveo.com/175/) override to match _variants_
              rather than _products_.
            example: '["color","size"]'
      description: '[Deprecated - use `configuration.variant` instead]. The configuration that allows indexed [items](https://docs.coveo.com/210/)
        representing distinct _variants_ in the catalog to be identified as such.'
    FieldsSuggestionsQueryModel:
      required:
      - productObjectType
      - sourceNames
      type: object
      properties:
        sourceNames:
          minItems: 1
          uniqueItems: true
          type: array
          description: A list of source names containing the product content of the catalog
          items:
            type: string
            description: A list of source names containing the product content of the catalog
        availabilitySourceNames:
          uniqueItems: true
          type: array
          description: A list of source names containing the availability objects for the catalog
          items:
            type: string
            description: A list of source names containing the availability objects for the catalog
        productObjectType:
          minLength: 1
          type: string
          description: Product objecttype type
        variantObjectType:
          type: string
          description: Variant objecttype type
        availabilityObjectType:
          type: string
          description: Availability objecttype type
      description: The fields suggestions query to be executed
    FieldSuggestionsModel:
      type: object
      properties:
        name:
          type: string
          description: The field name.
        examples:
          uniqueItems: true
          type: array
          description: The field examples.
          items:
            type: object
            description: The field examples.
        objectTypes:
          uniqueItems: true
          type: array
          description: The field object types.
          items:
            type: string
            description: The field object types.
      description: The list of fields suggestions.
    FieldsSuggestionsModel:
      type: object
      properties:
        fields:
          type: array
          description: The list of fields suggestions.
          items:
            $ref: '#/components/schemas/FieldSuggestionsModel'
    CreateCatalogConfigurationV1Model:
      required:
      - name
      - product
      type: object
      properties:
        name:
          maxLength: 50
          minLength: 1
          type: string
          example: ACME Configuration
        product:
          $ref: '#/components/schemas/CreateProductHierarchyModel'
        variant:
          $ref: '#/components/schemas/CreateVariantHierarchyModel'
        availability:
          $ref: '#/components/schemas/CreateAvailabilityHierarchyModel'
        fieldsMapping:
          type: object
          additionalProperties:
            type: string
            example: '{"ec_name":"title","ec_price":"prix"}'
          example:
            ec_name: title
            ec_price: prix
        availabilityFilterStrategy:
          type: string
          description: Strategy for filtering availabilities when executing a search. <br>**Default:** `ALWAYS`<br>The current
            supported strategies are `ALWAYS` and `WHEN_SPECIFIED`.<br>`ALWAYS` will perform the search filtering by availabilities
            and it will only return items with availabilities.<br>`WHEN_SPECIFIED` will only perform the search filtering
            by availabilities if an availabilityId is specified in the query, otherwise it won't filter by availabilities
            and it will return all items.
          enum:
          - ALWAYS
          - WHEN_SPECIFIED
      description: The catalog configuration to create.
    CachedFieldStats:
      required:
      - lastUpdated
      - nextUpdate
      type: object
      properties:
        fieldStats:
          type: array
          description: Collection of statistics about the usage of fields by a catalog
          items:
            $ref: '#/components/schemas/FieldStatsModel'
        lastUpdated:
          type: string
          description: The date at which the cached item was last refreshed in number of milliseconds since UNIX epoch.
          format: date-time
        nextUpdate:
          type: string
          description: The date at which the cached item will next be refreshed in number of milliseconds since UNIX epoch.
          format: date-time
    FieldStatsItemModel:
      type: object
      properties:
        objectsWithField:
          type: integer
          description: Number of objects with this field
          format: int32
          example: 9
        objectsWithType:
          type: integer
          description: Number of objects with this type
          format: int32
          example: 100
      description: Availability stats
    FieldStatsModel:
      type: object
      properties:
        fieldName:
          type: string
          description: Name of the field
          example: ec_brand
        product:
          $ref: '#/components/schemas/FieldStatsItemModel'
        variant:
          $ref: '#/components/schemas/FieldStatsItemModel'
        availability:
          $ref: '#/components/schemas/FieldStatsItemModel'
      description: Collection of statistics about the usage of fields by a catalog
    CommercePageModelCatalogConfigurationModelWithAssociatedCatalogs:
      required:
      - items
      - totalEntries
      - totalPages
      type: object
      properties:
        items:
          type: array
          description: The retrieved page of items.
          items:
            $ref: '#/components/schemas/CatalogConfigurationModelWithAssociatedCatalogs'
        totalEntries:
          type: integer
          description: The total number of results that match the query.
          format: int64
        totalPages:
          type: integer
          description: The total number of pages of items available.
          format: int32
      description: Page
    CatalogIdAndConfigurationModel:
      type: object
      properties:
        catalogId:
          type: string
          description: The unique identifier of the catalog. Ignored when included in the body of a POST or PUT request.
          format: uuid
          example: 644e1dd7-2a7f-18fb-b8ed-ed78c3f92c2b
        catalogConfiguration:
          $ref: '#/components/schemas/CatalogConfigurationModel'
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://platform.cloud.coveo.com/oauth/authorize
          tokenUrl: https://platform.cloud.coveo.com/oauth/token
          scopes:
            full: required
