        schema:
          type: string
      - name: catalogId
        in: path
        description: The unique identifier of the [catalog](https://docs.coveo.com/en/3143/) to update.<br />**Example:**
          `644e1dd7-2a7f-18fb-b8ed-ed78c3f92c2b`
