components:
  schemas:
    DneConfigurationModel:
      required:
      - modelDisplayName
      type: object
      properties:
        modelDisplayName:
          type: string
          description: The model display name in the Coveo Administration console.<br />**Example:** `MyModelDisplayName`
          example: MyModelDisplayName
        exportPeriod:
          type: string
          description: The period of UA data to learn from when rebuilding the model. The `exportPeriod` uses the moment when
            the model was last generated as a base. Must be in the ISO8601 period format (i.e., PyYmMwWdDThHmMsS).<br />**Example:**
            `P1M`
          example: P1M
        intervalTime:
          type: integer
          description: 'The number of `intervalUnit` to wait between each rebuild of the model.


            Must be greater than or equal to `1`.<br />**Example:** `1`'
          format: int32
          example: 1
          enum:
          - null
        intervalUnit:
          type: string
          description: The duration unit to use when interpreting the rebuild `intervalTime` for the model.<br />**Example:**
            `WEEK`
          example: WEEK
          enum:
          - DAY,WEEK,MONTH
        commonFilter:
          type: string
          description: 'The filter to apply to the ’Common’ event dimensions (shared by all event types) of the UA data to
            learn from when rebuilding the model.


            See [Usge Analytics Read Filter Syntax](https://docs.coveo.com/en/2727/).<br />**Example:** `(originlevel1 ==
            "My Hub")`'
          example: (originlevel1 == "My Hub")
        searchEventFilter:
          type: string
          description: 'The filter to apply to the ‘Click’ and ‘Search’ event dimensions of the UA data to learn from when
            rebuilding the model.


            See [Usge Analytics Read Filter Syntax](https://docs.coveo.com/en/2727/).<br />**Example:** `(originlevel1 ==
            "My Hub")`'
          example: (originlevel1 == "My Hub")
        fieldsToAutoSelect:
          type: array
          description: The names of the fields to consider for automatic selection. **Note:** Once set, this property cannot
            be updated.<br />**Example:** `["filetype", "category"]`
          example:
          - filetype
          - category
          items:
            type: string
            description: The names of the fields to consider for automatic selection. **Note:** Once set, this property cannot
              be updated.<br />**Example:** `["filetype", "category"]`
            example: '["filetype","category"]'
        documentExtractionQuery:
          type: string
          description: The query that determines the documents to extract. Use the `POST /rest/organizations/{organizationId}/machinelearning/configuration/dne/documentextractionquery`
            endpoint to generate the proper query. **Note:** Once set, this property cannot be updated.<br />**Example:**
            `(@filetype OR @category) AND @source==("My source")`
          example: (@filetype OR @category) AND @source==("My source")
        viewAllContent:
          type: boolean
          description: Whether to allow the model to extract secured documents. **Note:** Once set, this property cannot be
            updated.
        modelId:
          type: string
          description: The unique identifier of the target machine learning model.<br />**Example:** `My_Model_ID`
          example: My_Model_ID
      description: The configuration for the update of a DNE model.
    FilterConditionModel:
      required:
      - field
      - operator
      - value
      type: object
      properties:
        field:
          type: string
          description: The field to use for the filter.<br />**Example:** `author`
          example: author
        operator:
          type: string
          description: The operator to use for the condition.<br />**Example:** `EQUALS`
          example: EQUALS
          enum:
          - EQUALS
          - NOT_EQUALS
          - EQUALS, NOT_EQUALS
        value:
          type: string
          description: The value to use for the filter.<br />**Example:** `John Smith`
          example: John Smith
      description: A custom filter condition.
    SmartSnippetsPreviewRequest:
      type: object
      properties:
        sources:
          type: array
          description: The names of the sources containing the items that the model should use to extract snippets.<br />**Example:**
            `["CommunityArticles","SalesforceCatalog"]`
          example:
          - CommunityArticles
          - SalesforceCatalog
          items:
            type: string
            description: The names of the sources containing the items that the model should use to extract snippets.<br />**Example:**
              `["CommunityArticles","SalesforceCatalog"]`
            example: '["CommunityArticles","SalesforceCatalog"]'
        filterConditions:
          type: array
          description: The custom filter conditions to target specific documents.
          items:
            $ref: '#/components/schemas/FilterConditionModel'
        advancedQuery:
          type: string
          description: The query that determines the documents to extract. Cannot be used with other document extraction parameters,
            e.g. sources, filter conditions, etc.<br />**Example:** `@source==("My source") AND @permanentid AND @language="English"`
          example: '@source==("My source") AND @permanentid AND @language="English"'
      description: The configuration for the Smart Snippets preview.
    SmartSnippetsPreviewResponse:
      type: object
      properties:
        query:
          type: string
