        interfaces:
          type: array
          description: A list of interface IDs that are bound to the Insight Panel configuration.
          example:
          - interface-id-1
          - interface-id-2
          items:
            type: string
    RestInsightPanelConfigurationListIds:
      required:
      - ids
      type: object
      properties:
        ids:
          type: array
          description: A list of configuration ids.
          example:
          - config-id-1
          - config-id-2
          items:
            type: string
    RestInsightPanelConfigurationUpdate:
      required:
      - contextFields
      - interfaces
      - name
      - pipeline
      type: object
      properties:
        name:
          type: string
          description: The name of the Insight Panel configuration.
          example: My Insight Panel
        pipeline:
          type: string
          description: The ID of the query pipeline to use.
        contextFields:
          type: object
          properties: {}
          description: A dictionary in which the keys represent context keys, and the values are CRM field names.
          example:
            subject: case_subject
            description: case_description
        interfaces:
          type: array
          description: A list of interface IDs that are bound to the Insight Panel configuration.
          example:
          - interface-id-1
          - interface-id-2
          items:
            type: string
    RestInsightPanelConfiguration:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the Insight Panel configuration.
        name:
          type: string
          description: The name of the Insight Panel configuration.
          example: My Insight Panel
        pipeline:
          type: object
          properties:
            id:
              type: string
              description: The unique identifier of the query pipeline.
            name:
              type: string
              description: The name of the query pipeline.
            models:
              type: object
              properties:
                art:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                  description: Indicates whether an Automatic Relevance Tuning (ART) model is configured for the query pipeline.
                dne:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                  description: Indicates whether a Dynamic Navigation Experience (DNE) model is configured for the query pipeline.
                qs:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                  description: Indicates whether a Query Suggestion (QS) model is configured for the query pipeline.
