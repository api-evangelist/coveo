        id\": \"abc123\",                                           // The unique citation ID.          Required.\n      \"\
        title\": \"Coveo Search Best Practices\",                   // The item title. It may be empty. Required.\n      \"\
        uri\": \"https://example.com/docs/search\",                 // The item URI.                    Required.\n      \"\
        permanentid\": \"xyz789\",                                  // The item permanent ID.           Required.\n      \"\
