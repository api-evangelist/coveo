        \      Optional.\n        \"date\": 1680700000,                                     // The item date (Unix timestamp).\
        \  Optional.\n        \"filetype\": \"html\",                                     // The item file type.         \
        \     Optional.\n        \"language\": [\"en\"],                                     // The item language(s).    \
        \        Optional.\n        \"objecttype\": \"document\",                               // The item object type. \
        \           Optional.\n        \"parents\": \"parent-id-123\",                             // The item parents.  \
        \              Optional.\n        \"permanentid\": \"xyz789\",                                // The item permanent\
        \ ID.           Optional.\n        \"size\": 2048,                                           // The item size in bytes.\
        \          Optional.\n        \"source\": \"Documentation\",                              // The item source.    \
        \             Optional.\n        \"sourcetype\": \"Web\"                                     // The item source type.\
        \            Optional.\n      }\n    }\n  ]\n}\n```\n"
      value:
