          type:
            type: string
            description: The type of the facet field.
            example: REGULAR
            enum:
            - REGULAR
            - CONTINUOUS
            - NUMERICAL_RANGES
            - HIERARCHICAL
          displayNames:
            uniqueItems: true
            type: array
            description: A list of localized display names for the facet field. When a localized display name is not provided
              for a given language, the index non-localized display name is used. If a non-localized display name is not configured,
              the index field name is used.
            items:
              $ref: '#/components/schemas/LocalizedValueModel'
          injectionDepth:
            minimum: 1000
            type: integer
            description: "The maximum number of items to scan for facet values.\n<br/>When value is not provided:<br/>\n \
              \   <ul>\n        <li>Creation: defaults to `1000`</li>\n        <li>Update: preserves existing database value</li>\n\
              \    </ul>\n"
            format: int32
            default: 1000
          sortCriteria:
            type: string
            description: The criteria used to sort facet field values.
            example: relevance
            default: RELEVANCE
            enum:
            - RELEVANCE
            - ALPHANUMERIC
            - OCCURRENCES
          initialNumberOfValues:
            maximum: 1000
            minimum: 1
            type: integer
            description: The initial number of facet values shown.
            format: int32
            default: 8
          useInFilterSuggestions:
            type: boolean
            description: Whether the facet field can be used in filter suggestions. See [here](https://docs.coveo.com/en/o8ce0240#headless-implementation)
              for more guidance.
          resultsMustMatch:
            type: string
            description: "Specifies how a result must match the selected values.\n<br/>When value is not provided:<br/>\n\
              \    <ul>\n        <li>Creation: defaults to `AT_LEAST_ONE_VALUE`</li>\n        <li>Update: preserves existing\
              \ database value</li>\n    </ul>\n"
            example: AT_LEAST_ONE_VALUE
            enum:
            - AT_LEAST_ONE_VALUE
            - ALL_VALUES
          pinnedValues:
            type: array
            description: A list of pinned facet values. Pinned values are always shown at the top of the facet in the provided
              order when there is at least one product that matches the pinned value.
            items:
              $ref: '#/components/schemas/LocalizedPinnedFacetValuesModel'
            default: []
    ContextMappingModel:
      required:
      - destinations
      - key
      - type
      type: object
      properties:
        key:
          pattern: ^[a-zA-Z]\w{0,63}$
          type: string
          description: A unique key for the context mapping. Must start with a letter and contain only letters, numbers, and
            underscores.
          example: user_segment
        type:
          type: string
          description: The data type for context mapping values
          example: STRING
          enum:
          - BOOLEAN
          - STRING
          - NUMBER
          - PRODUCT_LIST
        destinations:
          minItems: 1
          type: array
          description: The list of destinations where this context mapping should be applied.
          example:
          - attribute: QUERY_PIPELINE_CONTEXT
          - attribute: FIELD_ALIASES
          items:
            $ref: '#/components/schemas/MappingDestination'
      description: The context mapping configuration to create
    MappingDestination:
      required:
      - attribute
      type: object
      properties:
        attribute:
          type: string
          description: The destination type where context mapping values can be applied
          example: QUERY_PIPELINE_CONTEXT
          enum:
          - QUERY_PIPELINE_CONTEXT
          - ML_CONTEXT
          - FIELD_ALIASES
        fieldAlias:
          type: string
          description: The field alias template used when attribute is FIELD_ALIASES. Must resolve to a field name pattern.
          example: price_{{contextValue}}
        fieldSource:
          type: string
          description: The field source template used when attribute is FIELD_ALIASES. Must resolve to 'field.subkey' pattern.
          example: price.{{contextValue}}
      description: The list of destinations where this context mapping should be applied.
      example:
      - attribute: QUERY_PIPELINE_CONTEXT
      - attribute: FIELD_ALIASES
    RuleLocaleModel:
