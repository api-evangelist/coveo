    hostedpage-file-javascript:
      type: object
      description: JavaScript resource appended to the header of a specific hosted page in the target Coveo organization.
      properties:
        isModule:
          type: boolean
          description: Whether the inline code should be treated as a JavaScript module. If this property is `true`, the `type`
            property will be set to `module` on the `script` tag.
          required: true
        inlineContent:
          type: string
          description: The content of the header `script` tag. If this property is defined, the `url` property should not
            be specified.
          example: window.location = 'about:blank';
        url:
          type: string
          description: The URL of the JavaScript source file. If this property is defined, the `inlineContent` property should
            not be specified.
          example: https://static.cloud.coveo.com/atomic/v2/index.esm.js
    hostedpage-file-css:
      type: object
      description: CSS resource appended in the header, pertaining to a specific hosted page in the target Coveo organization.
      properties:
        inlineContent:
          type: string
          description: The content of the header `style` tag. If this property is defined, the `url` property should not be
            specified.
          example: 'body { color: #e0e0e0; background-color: #2a2aa2; }'
        url:
          type: string
          description: The URL of CSS stylesheet. If this property is defined, the `inlineContent` property should not be
            specified.
          example: https://static.cloud.coveo.com/atomic/v2/themes/coveo.css
    ipx-interface-config:
      type: object
      properties:
        name:
          type: string
          description: A short descriptive name to help manage IPXs.
          example: ExStore
        facets:
          type: array
          description: The list of facets to display in the IPX interface.
          items:
            properties:
              field:
                type: string
                description: The [field](https://docs.coveo.com/en/200) on which the facet is based.
              label:
                type: string
                description: The label of the facet.
          example:
          - field: source
            label: Source
          - field: objecttype
            label: Object Type
        tabs:
          type: array
          description: The list of tabs to display in the IPX interface.
          items:
            properties:
              label:
                type: string
                description: The label of the facet.
              conditions:
                type: array
                description: The conditions of the tab to use on fields.
                items:
                  properties:
                    conditionType:
                      type: string
                      description: The type of condition to apply on a field.
                    field:
                      type: string
                      description: The [field](https://docs.coveo.com/en/200) on which the tab is based.
                    values:
                      type: array
                      description: The value to use for the tab condition.
          example:
          - label: All
            conditions: []
          - label: Pdf
            conditions:
              conditionType: mustMatch
              field: fileType
              values:
              - pdf
        container:
          type: object
          description: The IPX container that defines how to display the IPX search interface on your web page.
          properties:
            button:
              type: object
              description: The IPX button.
              properties:
                label:
                  type: string
                  description: The label of the button.
                  example: Coveo search
                openIcon:
                  type: string
                  description: The SVG open icon of the button.
                  example: <svg viewBox='0 0 10 10' ... ></svg
            targetSelector:
              type: string
              description: CSS selector to target the HTML element on your web page.
              example: '#sidepanel'
            usesTargetSelector:
              type: boolean
              description: Whether to use the target selector.
        footer:
          type: array
          description: The list of the IPX footer parts.
          items:
            properties:
              label:
                type: string
                description: The footer part's label to display.
                example: Coveo
              link:
                type: string
                description: The redirect URL.
                example: https://www.coveo.com
              icon:
                type: string
                description: The SVG logo to display.
                example: <svg viewBox='0 0 10 10' ... ></svg
        resultTemplates:
          type: array
          description: The list of IPX result templates.
          items:
            properties:
              name:
                type: string
                description: The result template name.
              layout:
                type: string
                description: The result template layout.
              badge:
                type: object
                description: The result template badge.
                properties:
                  field:
                    type: string
                    description: The [field](https://docs.coveo.com/en/200) on which the tab is based.
                  color:
                    type: string
                    description: The color of the result template badge.
              details:
                type: array
                description: The result template details.
                items:
                  properties:
                    field:
                      type: string
                      description: The [field](https://docs.coveo.com/en/200) on which the tab is based.
                    label:
                      type: string
                      description: The label of the result template detail.
              conditions:
                type: array
                description: The conditions of the tab to use on fields.
                items:
                  properties:
                    conditionType:
                      type: string
                      description: The type of condition to apply on a field.
                    field:
                      type: string
                      description: The [field](https://docs.coveo.com/en/200) on which the tab is based.
                    values:
                      type: array
                      description: The value to use for the tab condition.
          example:
          - name: Default
            layout: default
            badge:
              field: documenttype
              color: '#d057bf'
            details:
            - field: source
              label: source
            conditions: []
          - name: My Custom Template
            layout: default
            badge:
              field: documenttype
              color: '#e4e3e3'
            details:
            - field: source
              label: source
            conditions:
            - conditionType: isDefined
              field: filetype
            - conditionType: mustMatch
              field: sourcetype
              values:
              - youtube
        style:
          type: object
          description: The IPX styling.
          properties:
            fontFamily:
              type: string
              description: The font-family
              example: Comic Sans MS
            colors:
              type: object
              description: All changeable HEX colors of the IPX interface.
              properties:
                primary:
                  type: string
                  description: The primary color.
                  example: '#1372ec'
                neutral:
                  type: string
                  description: The secondary color.
                background:
                  type: string
                  description: The background color.
                visitedLink:
                  type: string
                  description: The visited link color.
                titles:
                  type: string
                  description: The color of the titles.
                button:
                  type: string
                  description: The color of the IPX button.
                buttonLabel:
                  type: string
                  description: The color of the IPX button label.
        settings:
          type: object
          description: The IPX settings.
          properties:
            smartSnippets:
              type: object
              description: The smart snippets settings.
              properties:
                enabled:
                  type: boolean
            genQA:
              type: object
              description: Whether to enable GenQA.
              properties:
                enabled:
                  type: boolean
                allowed:
                  type: boolean
            peopleAlsoAsk:
              type: object
              description: Whether to enable People Also Ask.
              properties:
                enabled:
                  type: boolean
            disableDynamicNavigation:
              type: boolean
              description: Whether to disable dynamic navigation.
              properties:
                enabled:
                  type: boolean
        pipelines:
          type: object
          description: The IPX pipelines, conditions and models that were created on IPX creation.
          properties:
            searchPipeline:
              $ref: '#/components/schemas/associated-pipeline'
            recsPipeline:
              $ref: '#/components/schemas/associated-pipeline'
