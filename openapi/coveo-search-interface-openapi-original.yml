              type: object
              description: Whether to enable people also ask.
              properties:
                enabled:
                  type: boolean
            genQA:
              type: object
              description: Whether to enable GenQA.
              properties:
                enabled:
                  type: boolean
            agent:
              type: object
              description: Whether to enable the agent-based generated answer. Mutually exclusive with genQA.
              properties:
                enabled:
                  type: boolean
                  default: false
      required:
      - name
    search-page-interface-config-id:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the search interface configuration.
          example: 123e4567-e89b-12d3-a456-426614174000
        name:
          type: string
          description: A short descriptive name to help manage search pages.
          example: ExStore
        facets:
          type: array
          description: The list of facets to display in the search page.
          items:
            properties:
              field:
                type: string
                description: The [field](https://docs.coveo.com/en/200) on which the facet is based.
              label:
                type: string
                description: The label of the facet.
          example:
          - field: source
            label: Source
          - field: objecttype
            label: Object Type
        sortCriteria:
          type: array
          description: The array of sort criteria the end user can select when interacting with the search interface.
          items:
            properties:
              by:
                type: string
                description: 'The kind of sort criterion. Required. <br />**Allowed values:**<br />- `relevancy`<br />- `date`<br
                  />- `field`: sort based on the values of a target field, which you need to specify in the `field` parameter.'
                enum:
                - relevancy
                - date
                - field
              label:
                type: string
                description: The label of the sort criterion. Required.
              field:
                type: string
                description: The [field](https://docs.coveo.com/en/200) on which the sort is based. Required when `by` value
                  is `field`, and ignored otherwise.<br />Must be [sortable in the index](https://docs.coveo.com/en/1833/index-content/add-or-edit-a-field#sortable).
              order:
                type: string
                enum:
                - ASC
                - DESC
                description: 'The sort direction, if applicable.<br />Default behaviour is a follows:<br />- If the `by` value
                  is `relevancy`, this parameter does not apply.<br />- If the `by` value is `date`, the default value is
                  `DESC`.<br />- If the `by` value is anything else, the default value is `ASC`.<br />**Allowed values:**
                  <br />- `ASC`: ascending <br>- `DESC`: descending'
            required:
            - by
            - label
        accesses:
          $ref: '#/components/schemas/interface-access'
        layout:
          type: string
          description: The search page layout.
          enum:
          - list
          - grid
        resultTemplates:
          type: array
          description: The list of search page result templates.
          items:
            properties:
              name:
                type: string
                description: The result template name.
              badges:
                type: array
                description: The result template badges.
                items:
                  properties:
                    field:
                      type: string
                      description: The [field](https://docs.coveo.com/en/200) on which the badge is based.
                    color:
                      type: string
                      description: The color of the result template badge.
              details:
                type: array
                description: The result template details.
                items:
                  properties:
                    field:
                      type: string
                      description: The [field](https://docs.coveo.com/en/200) on which the tab is based.
                    label:
                      type: string
                      description: The label of the result template detail.
              conditions:
                type: array
                description: The conditions of the tab to use on fields.
                items:
                  properties:
                    conditionType:
                      type: string
                      description: The type of condition to apply on a field.
                    field:
                      type: string
                      description: The [field](https://docs.coveo.com/en/200) on which the tab is based.
                    values:
                      type: array
                      description: The value to use for the tab condition.
              imageSize:
                type: string
                description: The size of the result template image.
                enum:
                - NONE
                - SMALL
                - MEDIUM
                - LARGE
              descriptionEnabled:
                type: boolean
                description: Whether to display the result template description.
              resultActions:
                type: object
                description: The result template actions.
                properties:
                  copyToClipboard:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                  quickView:
                    type: object
                    properties:
                      enabled:
                        type: boolean
          example:
          - name: Default
            layout: default
            badges:
            - field: documenttype
              color: '#d057bf'
            details:
            - field: source
              label: source
            conditions: []
          - name: My Custom Template
            layout: default
            badges:
            - field: documenttype
              color: '#e4e3e3'
            details:
            - field: source
              label: source
            conditions:
            - conditionType: isDefined
              field: filetype
            - conditionType: mustMatch
              field: sourcetype
              values:
              - youtube
        style:
          type: object
          description: The search page styling.
          properties:
            fontFamily:
              type: string
              description: The font-family
              example: Comic Sans MS
            colors:
              type: object
              description: All changeable HEX colors of the search page.
              properties:
                accent1:
                  type: string
                  description: The primary color.
                  example: '#1372ec'
                accent2:
                  type: string
                  description: The secondary color.
                background:
                  type: string
                  description: The background color.
                titles:
                  type: string
                  description: The color of the titles.
                normalText:
                  type: string
                  description: The color of other text.
                navigationBackground:
                  type: string
                  description: The color of the navigation background.
        settings:
          type: object
          description: The search page settings.
          properties:
            targetSelector:
              type: string
              description: CSS selector to target the HTML element in which the search page will render.
              example: '#sidepanel'
            querySuggestions:
              type: object
              description: Whether to enable query suggestions.
              properties:
                enabled:
                  type: boolean
            queryHistory:
              type: object
              description: Whether to enable query history.
              properties:
                enabled:
                  type: boolean
            smartSnippets:
              type: object
              description: Whether to enable smart snippets.
              properties:
                enabled:
                  type: boolean
            peopleAlsoAsk:
              type: object
              description: Whether to enable people also ask.
              properties:
                enabled:
                  type: boolean
            genQA:
              type: object
              description: Whether to enable GenQA.
              properties:
                enabled:
                  type: boolean
            agent:
              type: object
              description: Whether to enable the agent-based generated answer. Mutually exclusive with genQA.
              properties:
                enabled:
                  type: boolean
                  default: false
        created:
          type: string
          format: date-time
          description: The creation timestamp. (ISO 8601)
          example: '2021-12-31T12:46:00.000Z'
        createdBy:
          type: string
          description: The creator principal.
          example: jdoe@gmail.com-google
        updated:
          type: string
          format: date-time
          description: The last update timestamp. (ISO 8601)
          example: '2001-12-31T13:03:00.000Z'
        updatedBy:
          type: string
          description: The last updater principal.
          example: jdoe@gmail.com-google
      required:
      - id
      - name
    search-page-interface-config-project:
      allOf:
      - $ref: '#/components/schemas/search-page-interface-config'
      - type: object
        properties:
          projectIds:
            type: array
            description: The list of project IDs associated with the search page interface.
            items:
              type: string
    pipelines-status:
      type: array
      description: A list containing the pipeline(s) used by the interface.
      items:
        $ref: '#/components/schemas/pipeline-status'
    pipeline-status:
      type: object
      description: The status of a pipeline.
      properties:
        id:
          type: string
          description: The unique identifier of the pipeline.
          example: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa
        name:
          type: string
          description: The name of the pipeline.
          example: My pipeline
        pipelineType:
          type: string
          description: The type of the pipeline.
          example: search
        conditionId:
          type: string
          description: The unique identifier of the associated condition.
          example: bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb
        models:
          type: array
          items:
            description: The list of models used by the pipeline.
            properties:
              id:
                type: string
                description: The unique identifier of the model.
                example: cccccccc-cccc-cccc-cccc-cccccccccccc
              modelStatus:
                type: string
                description: The status of the model.
                example: ACTIVE
              modelEngine:
                type: string
                description: The type of the model.
                example: genqa
    associated-pipeline:
      type: object
      description: The associated pipeline.
      properties:
        id:
          type: string
          description: The unique identifier of the search pipeline.
          example: aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa
        name:
          type: string
          description: The name of the search pipeline.
          example: My pipeline
        pipelineType:
          type: string
          description: The type of the pipeline.
          example: search
        conditionId:
          type: string
          description: The unique identifier of the condition.
          example: bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb
        models:
          type: array
          description: The list of models.
          items:
            properties:
              modelId:
                type: string
                description: The unique identifier of the model.
                example: cccccccc-cccc-cccc-cccc-cccccccccccc
              modelDisplayName:
                type: string
                description: The name of the model.
                example: My model
              engineId:
                type: string
                description: The type of the model.
                example: topclicks
              exportPeriod:
                type: string
                description: The export period of the model.
                example: P3M
              intervalTime:
                type: integer
                description: The interval time of the model.
                example: 1
              intervalUnit:
                type: string
                description: The interval unit of the model.
                example: WEEK
              exportOffset:
                type: string
                description: The export offset of the model.
                example: PT0S
              extraConfig:
                type: object
                description: The extra configuration of the model.
                properties:
                  commerceSupport:
                    type: object
                    description: Whether the model should support commerce use-cases.
                    properties:
                      enabled:
                        type: boolean
    InsightPanelInterface:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the Insight Panel interface.
          example: e35eb3f4-353e-4ab8-96b8-35c09d5951c9
          required: true
        name:
          type: string
          description: The name of the Insight Panel interface
          example: Example Insight Panel
          required: true
        resultTemplates:
          type: array
          items:
            $ref: '#/components/schemas/InsightPanelResultTemplate'
        facets:
          type: array
          items:
            $ref: '#/components/schemas/Facet'
        tabs:
          type: array
          items:
            $ref: '#/components/schemas/Tab'
        settings:
          $ref: '#/components/schemas/SettingsSection'
    InsightPanelBodyParams:
      type: object
      properties:
        name:
          type: string
          description: The name of the Insight Panel interface
          example: Example Insight Panel
          required: true
        resultTemplates:
          type: array
          required: true
          items:
            $ref: '#/components/schemas/InsightPanelResultTemplate'
        facets:
          type: array
          required: true
          items:
            $ref: '#/components/schemas/Facet'
        tabs:
          type: array
          required: true
          items:
            $ref: '#/components/schemas/Tab'
        settings:
          $ref: '#/components/schemas/SettingsSection'
    InsightPanelResultTemplate:
      type: object
      description: Template
      properties:
        name:
          type: string
          description: The name of the template
          example: Example Template
          required: true
        layout:
          $ref: '#/components/schemas/TemplateLayout'
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
        badge:
          $ref: '#/components/schemas/Badge'
        details:
          type: array
          items:
            $ref: '#/components/schemas/Detail'
        resultActions:
          $ref: '#/components/schemas/ResultActions'
        tags:
          $ref: '#/components/schemas/Tags'
    TemplateLayout:
      type: string
      description: The template layout to use.
      enum:
      - default
      - thumbnail
    Condition:
      type: object
      description: The conditions a result needs to meet to use the template.
      properties:
        field:
          type: string
        conditionType:
          type: string
          description: The type of condition to apply on a field.
          enum:
          - isDefined
          - isNotDefined
          - mustMatch
          - mustNotMatch
    Badge:
      type: object
      description: The badge to display.
      properties:
        field:
          type: string
        label:
          type: string
        color:
          type: string
          example: '#FF00AA'
    Detail:
      type: object
      description: The metadata details to display.
      properties:
        field:
          type: string
        label:
          type: string
    ResultActions:
      type: object
      description: The available result actions.
      enum:
      - attachToCase
      - copyToClipboard
      - quickView
      - sendAsEmail
      - sendToFeed
      properties:
        attachToCase:
          type: object
          properties:
            enabled:
              type: boolean
        copyToClipboard:
          type: object
          properties:
            enabled:
              type: boolean
        quickView:
          type: object
          properties:
            enabled:
              type: boolean
        sendAsEmail:
          type: object
          properties:
            enabled:
              type: boolean
        sendToFeed:
          type: object
          properties:
            enabled:
              type: boolean
    Tags:
      type: object
      description: The tags allowed to be displayed.
      properties:
        recommended:
          $ref: '#/components/schemas/TagParam'
        viewedByCustomer:
          $ref: '#/components/schemas/TagParam'
        featured:
          $ref: '#/components/schemas/TagParam'
    TagParam:
      type: object
      properties:
        enabled:
          type: boolean
        color:
          type: string
          example: '#FF00AA'
    Facet:
      type: object
      description: The list of facets to display.
      properties:
        field:
          type: string
          required: true
        label:
          type: string
        displayValueAs:
          type: string
    Tab:
      type: object
      description: The list of tabs to display.
      properties:
        label:
          type: string
          required: true
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
    UserActionsOptions:
      type: object
      description: Options to configure a view of the actions taken by the user who submitted the case.
      properties:
        enabled:
          type: boolean
          description: Whether to enable the feature.
          required: true
        recentClickedDocuments:
          type: object
          description: Whether to show documents recently clicked by the user.
          required: true
          properties:
            enabled:
              type: boolean
        recentQueries:
          type: object
          description: Whether to show recent queries performed by the user.
          required: true
          properties:
            enabled:
              type: boolean
        timeline:
          type: object
          description: Whether to show a timeline of the user's actions.
          required: true
          properties:
            enabled:
              type: boolean
    SettingsSection:
      type: object
      properties:
        createArticle:
          type: object
          description: Display a button to create a knowledge article.
          required: true
          properties:
            enabled:
              type: boolean
        fullSearch:
          type: object
          description: Display a button to open a full search page.
          required: true
          properties:
            enabled:
              type: boolean
        userActions:
          $ref: '#/components/schemas/UserActionsOptions'
    Page:
      type: object
      properties:
        totalPages:
          type: integer
          description: The total number of pages.
        totalEntries:
          type: integer
          description: The total number of items.
    InterfaceVersionInfoPage:
      allOf:
      - $ref: '#/components/schemas/Page'
      - type: object
        properties:
          items:
            type: array
            description: The list of interface versions.
            items:
              $ref: '#/components/schemas/InterfaceVersionInfo'
    InterfaceVersionInfo:
      type: object
      properties:
        version:
          type: integer
          description: The sequential number attributed to the version.
        label:
          type: string
          description: An optional label describing the version changes.
          required: false
        created:
          type: object
          $ref: '#/components/schemas/CreatedChangeInfo'
        updated:
          type: object
          $ref: '#/components/schemas/UpdatedChangeInfo'
        isPublished:
          type: boolean
          description: Indicates whether the version is currently published.
        restoredFromVersion:
          type: integer
          description: Indicates the origin of the current version, if it was restored.
          required: false
    InsightInterfaceVersionInfo:
      allOf:
      - $ref: '#/components/schemas/InterfaceVersionInfo'
      - type: object
        description: Information about a specific Insight Panel interface version.
        properties:
          configuration:
            type: object
            $ref: '#/components/schemas/InsightPanelInterface'
    IpxInterfaceVersionInfo:
      allOf:
      - $ref: '#/components/schemas/InterfaceVersionInfo'
      - type: object
        description: Information about a specific IPX interface version.
        properties:
          configuration:
            type: object
            $ref: '#/components/schemas/ipx-interface-config-id'
    ChangeInfo:
      type: object
      properties:
        by:
          type: string
          description: The identity of the user who performed the change.
        date:
          type: string
          description: The date and time at which the change was performed, in ISO-8601 format.
        firstName:
          type: string
          description: The first name of the user who performed the change.
        lastName:
          type: string
          description: The last name of the user who performed the change.
    CreatedChangeInfo:
      allOf:
      - $ref: '#/components/schemas/ChangeInfo'
      - type: object
        description: Information about the version creation.
    UpdatedChangeInfo:
      allOf:
      - $ref: '#/components/schemas/ChangeInfo'
      - type: object
        description: Information about the most recent version update.
    VersionLabelParams:
      type: object
      properties:
        label:
          type: string
          description: The label to set on the version. This value can be empty.
          required: true
  parameters:
    organization-id:
      name: organizationId
      description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).
      example: mycoveocloudv2organizationg8tp8wu3
      in: path
      required: true
      schema:
        type: string
    interface-id:
      name: interfaceId
      description: The unique identifier of the target search interface.
      example: 123e4567-e89b-12d3-a456-426614174000
      in: path
      required: true
      schema:
        type: string
    insight-panel-interface-id:
      name: interfaceId
      description: The unique identifier of the target Insight Panel interface.
      example: 123e4567-e89b-12d3-a456-426614174000
      in: path
      required: true
      schema:
        type: string
    insight-panel-config-id:
      name: insightConfigId
      description: The unique identifier of the target Insight Panel configuration.
      example: 123e4567-e89b-12d3-a456-426614174000
      in: query
      required: true
      schema:
        type: string
    filter:
      name: filter
      description: A substring that must appear in a search interface configuration name for this configuration to appear
        in results.
      example: Store
      in: query
      schema:
        type: string
    order:
      name: order
      description: 'The sort direction of the results.<br />Possible values:<br /> - `asc`: ascending order<br /> - `desc`:
        descending order'
      in: query
      schema:
        type: string
        enum:
        - asc
        - desc
    page:
      name: page
      description: The 0-based number of the page of configurations to list.
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 100
    perPage:
      name: perPage
      description: The maximum number of configurations to include per page.
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 20
    projectId:
      name: projectId
      description: The id of the project to which the resource belongs.
      in: query
      schema:
        type: string
    notify:
      name: notify
      description: Whether to send an email notification to new search page users.
      example: false
      in: query
      schema:
        type: boolean
    version-number:
      name: versionNumber
      description: The sequential number identifying a version.
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    versions-page:
      name: page
      description: The 0-based number of the page of versions to list.
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
        maximum: 100
    versions-per-page:
      name: perPage
      description: The number of versions to include per page.
      in: query
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
    versions-filter:
      name: filter
      description: A substring that must appear in a version label for this version to appear in results.
      in: query
      schema:
        type: string
    versions-order:
      name: order
      description: 'The sort direction of the versions based on the version number.<br />Possible values:<br /> - `asc`: ascending
        order<br /> - `desc`: descending order'
      in: query
      schema:
        type: string
        default: desc
  securitySchemes:
    oauth2:
      type: oauth2
      description: This API uses OAuth 2 with the implicit grant flow
      flows:
        implicit:
          authorizationUrl: /oauth/authorize
          scopes:
            full: full
security:
- oauth2:
  - full
servers:
- url: https://platform.cloud.coveo.com/rest/organizations
