      summary: Create a New Property.
      description: '<details><summary>Privilege required</summary>

        ```

        {"owner":"USAGE_ANALYTICS","targetDomain":"TRACKING_ID","type":"EDIT","targetId":"*"}

        ```

        </details>'
      operationId: createProperty
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: trackingId
        in: path
        required: true
        schema:
          type: string
      - name: displayName
        in: query
        required: true
        schema:
          type: string
      - name: defaultTimeZone
        in: query
        required: false
        schema:
          type: string
      - name: defaultCurrency
        in: query
        required: false
        schema:
