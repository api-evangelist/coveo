paths:
  /rest/organizations/{organizationId}/analyticsadmin/v1/properties/{trackingId}:
    get:
      tags:
      - Property API
      summary: Get a Specific Property.
      description: '<details><summary>Privilege required</summary>

        ```

        {"owner":"USAGE_ANALYTICS","targetDomain":"TRACKING_ID","type":"VIEW","targetId":"*"}

        ```

        </details>'
      operationId: getProperty
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: trackingId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PropertyModel'
      x-pretty-name: getProperty
      x-required-privilege:
        owner: USAGE_ANALYTICS
        targetDomain: TRACKING_ID
        type: VIEW
        targetId: '*'
      x-required-privileges:
      - owner: USAGE_ANALYTICS
        targetDomain: TRACKING_ID
        type: VIEW
        targetId: '*'
      x-ui-operation-id: /rest/organizations/paramId/analyticsadmin/v1/properties/paramId_get
    put:
      tags:
      - Property API
      summary: Update All Values of a Property.
      description: '<details><summary>Privilege required</summary>

        ```

        {"owner":"USAGE_ANALYTICS","targetDomain":"TRACKING_ID","type":"EDIT","targetId":"*"}

        ```

        </details>'
      operationId: updateProperty
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: trackingId
        in: path
        required: true
        schema:
          type: string
      - name: displayName
        in: query
        required: true
        schema:
          type: string
      - name: defaultTimeZone
        in: query
        required: false
        schema:
          type: string
      - name: defaultCurrency
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PropertyActionResponse'
      x-pretty-name: updateProperty
      x-required-privilege:
        owner: USAGE_ANALYTICS
        targetDomain: TRACKING_ID
        type: EDIT
        targetId: '*'
      x-required-privileges:
      - owner: USAGE_ANALYTICS
        targetDomain: TRACKING_ID
        type: EDIT
        targetId: '*'
      x-ui-operation-id: /rest/organizations/paramId/analyticsadmin/v1/properties/paramId_put
    post:
      tags:
