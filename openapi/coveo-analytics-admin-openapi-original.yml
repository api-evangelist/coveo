    delete:
      tags:
      - Property API
      summary: Delete a Property.
      description: '<details><summary>Privilege required</summary>

        ```

        {"owner":"USAGE_ANALYTICS","targetDomain":"TRACKING_ID","type":"EDIT","targetId":"*"}

        ```

        </details>'
      operationId: deleteProperty
      parameters:
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
      - name: trackingId
        in: path
