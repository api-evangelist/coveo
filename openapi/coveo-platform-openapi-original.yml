    JsonNode:
      type: object
    ReportCrawlingModuleModel:
      type: object
      properties:
        name:
          type: string
          description: The name of the crawling module.</br>**Example:** `Prod Crawling Module`
        versions:
          $ref: '#/components/schemas/CrawlingModuleVersionsModel'
        status:
          $ref: '#/components/schemas/JsonNode'
      description: A crawling module report.
    CrawlingModuleModel:
      type: object
      properties:
        maestroVersion:
          type: string
          description: The version of Maestro that is being used for the crawling module.</br>See [Updating Maestro](https://docs.coveo.com/en/3266/index-content/crawling-module-rest-api-reference#updating-maestro).</br>**Example:**
            `0.9.33`
        createdDate:
          type: string
          description: The crawling module creation date in W3C format (see [Date and Time Formats](https://www.w3.org/TR/NOTE-datetime)).</br>**Example:**
            `2018-05-22T23:36:30.589Z`
          format: date-time
        id:
          type: string
          description: The unique identifier of the crawling module.</br>**Example:** `crawlingmodulejvas70dt-d9c69mla-8912-6653-a90g-4ach953fd96b`
        organizationId:
          type: string
          description: The [unique identifier of the organization](https://docs.coveo.com/en/n1ce5273/manage-an-organization/find-your-organization-id)
            the crawling module was created for.</br>**Example:** `mycoveocloudorganizationg8tp8wu3`
        name:
          type: string
          description: The name of the crawling module.</br>**Example:** `Prod Crawling Module`
        updatedDate:
          type: string
          description: The last update date of the crawling module in number of milliseconds since UNIX epoch.</br>**Example:**
            `1556722921779`
          format: date-time
        lastHeartbeat:
          type: string
          description: The last heartbeat date of the crawling module in number of milliseconds since UNIX epoch.</br>**Example:**
            `1556722921779`
          format: date-time
        lastVersionUpgrade:
          type: string
          description: The last version upgrade date of the crawling module in number of milliseconds since UNIX epoch.</br>**Example:**
            `1556722921779`
          format: date-time
        disabled:
          type: boolean
          description: Whether the crawling module is disabled.
