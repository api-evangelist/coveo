      tags:
      - Organizations
      summary: Delete Organization
      description: 'Delete an [organization](https://docs.coveo.com/en/185/).<br /><br /><details><summary>Privilege required</summary>

        ```

        {"owner":"PLATFORM","targetDomain":"ORGANIZATION","type":"EDIT","targetId":"*"}

        ```

        </details>'
