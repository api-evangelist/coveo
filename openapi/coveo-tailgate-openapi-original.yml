components:
  schemas:
    ObjectTypeModel:
      type: object
      properties:
        hasIndexedCatalogContent:
          type: boolean
        hasIndexedIngestionContent:
          type: boolean
        objectTypeValues:
          type: array
          items:
            type: string
    MetadataNameAndValuesModel:
      type: object
      properties:
        metadataValuesByName:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    MetadataNameModel:
      type: object
      properties:
        metadataNames:
          type: array
          items:
            type: string
    PageModelString:
      type: object
      properties:
        items:
          type: array
          items:
            type: string
        totalEntries:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://platform.cloud.coveo.com/oauth/authorize
          tokenUrl: https://platform.cloud.coveo.com/oauth/token
          scopes:
            full: required
