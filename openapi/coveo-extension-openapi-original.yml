          format: int32
    ExtensionContentVersionModel:
      required:
      - id
      - lastModified
      type: object
      properties:
        lastModified:
          type: string
          description: 'The date at which the extension version was created (in number of milliseconds since UNIX epoch),
            i.e., the date of the modification of the extension when this extension version was created.<br />**Example**:
            `1556308241000`'
          format: date-time
        id:
          type: string
          description: The unique identifier of the extension target version.<br />**Example**:`hdJSDb4hTkdnsCynNtF.d657FgLSDydcj`
      description: An [extension](https://docs.coveo.com/en/206/) version.
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://platform.cloud.coveo.com/oauth/authorize
          tokenUrl: https://platform.cloud.coveo.com/oauth/token
          scopes:
            full: required
