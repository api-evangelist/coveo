components:
  schemas:
    EditExtensionModel:
      required:
      - content
      - name
      type: object
      properties:
        groupsThatCanEdit:
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/IdAndDisplayNameModel'
        apiKeysThatCanEdit:
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/IdAndDisplayNameModel'
        language:
          type: string
          description: 'The Python version.<br />**Allowed values:**<br /> - `PYTHON3`: Python 3. <br />'
          enum:
          - PYTHON3
        apiVersion:
          type: string
          description: The api version.<br /> **Allowed values:** <br /> - `v1`, `v2`. <br /> **Default value:** `v1`<br />
        content:
          type: string
          description: The body of the extension (user script), written in Python using the [document object](https://docs.coveo.com/en/34/).
        description:
          type: string
          description: A description of the extension.
        name:
          type: string
          description: A name for the extension.
        requiredDataStreams:
          type: array
          description: 'The [data streams](https://docs.coveo.com/en/2891/) required by the extension.<br />**Example:** `["BODY_TEXT",
            "THUMBNAIL"]`

            **Allowed values:**<br />- `BODY_TEXT`<br />- `BODY_HTML`<br />- `THUMBNAIL`<br />- `DOCUMENT_DATA`'
          items:
            type: string
            description: 'The [data streams](https://docs.coveo.com/en/2891/) required by the extension.<br />**Example:**
              `["BODY_TEXT", "THUMBNAIL"]`

              **Allowed values:**<br />- `BODY_TEXT`<br />- `BODY_HTML`<br />- `THUMBNAIL`<br />- `DOCUMENT_DATA`'
            enum:
            - BODY_TEXT
            - BODY_HTML
            - THUMBNAIL
            - DOCUMENT_DATA
            - BODY_MARKDOWN
        useVault:
          type: boolean
          description: Whether the extension uses vault parameters or not.
        enabled:
          type: boolean
      description: An [extension](https://docs.coveo.com/en/206/) to create or modify.
    IdAndDisplayNameModel:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
    ExtensionDisabledStatusModel:
      required:
      - disabledDate
      type: object
      properties:
        disabledDate:
          type: string
          description: The extension disablement date (in number of milliseconds since UNIX epoch).<br />**Example:** `1556034174000`
          format: date-time
        reason:
          type: string
          description: The reason why the extension was disabled.
      description: Information regarding the disabled state of an extension, if applicable.
    ExtensionHealthModel:
      required:
      - healthIndicator
      type: object
      properties:
        healthIndicator:
          type: string
          description: A qualitative health indicator.<br />**Allowed values:**<br /> - `GOOD`<br /> - `WARNING`<br /> - `PROBLEMATIC`<br
            /> - `UNKNOWN`<br />
          enum:
          - GOOD
          - WARNING
          - PROBLEMATIC
          - UNKNOWN
        reason:
          type: string
          description: Additional details if `healthIndicator` value is `Warning` or `Problematic`.
      description: Information regarding a health characteristic of the extension.
    ExtensionModel:
      required:
      - createdDate
      - description
      - enabled
      - id
      - language
      - lastModified
      - name
      - requiredDataStreams
      - status
      - versionId
      type: object
      properties:
        language:
          type: string
          description: 'The Python version.<br /> **Allowed values:** <br /> - `PYTHON3`: Python 3. <br />**Default value:**
            `PYTHON3`<br />'
          enum:
          - PYTHON3
        apiVersion:
          type: string
          description: The api version.<br /> **Allowed values:** <br /> - `v1`, `v2`. <br /> **Default value:** `v1`<br />
        content:
          type: string
          description: The body of the extension (user script), written in Python using the [document object](https://docs.coveo.com/en/34/).
        createdDate:
          type: string
          description: The creation date of the extension (in number of milliseconds since UNIX epoch).<br />**Example:**
            `1556034174000`
          format: date-time
        description:
          type: string
          description: A description of the extension
        enabled:
          type: boolean
          description: Whether the extension is enabled.<br />**Note:** Disabled extensions are not executed.
        id:
          type: string
          description: The unique identifier of the extension.<br />**Example:** `mycoveocloudv2organizationg8tp8wu3-vwlyqfbtjkotxqkmrxqjcbcpoy`
        lastModified:
          type: string
          description: 'The last modification date of the extension (in number of milliseconds since UNIX epoch).<br /> **Example**:
            `1556308241000`'
          format: date-time
        name:
          type: string
          description: The name of the extension.
        requiredDataStreams:
          type: array
          description: The [data streams](https://docs.coveo.com/en/2891/) required by the extension.
          items:
            type: string
            description: The [data streams](https://docs.coveo.com/en/2891/) required by the extension.
            enum:
            - BODY_TEXT
            - BODY_HTML
            - THUMBNAIL
            - DOCUMENT_DATA
            - BODY_MARKDOWN
        versionId:
          type: string
          description: The unique identifier of the extension version.<br />**Example**:`hdJSDb4hTkdnsCynNtF.d657FgLSDydcj`
        usedBy:
          type: array
          description: The [sources](https://docs.coveo.com/en/246/) the extension applies to.<br />**Note:** Only returned
            when performing GET/PUT `/extensions/{extensionId}` requests.
          items:
            $ref: '#/components/schemas/ExtensionUsedByModel'
        status:
          $ref: '#/components/schemas/ExtensionStatusModel'
        useVault:
          type: boolean
          description: Whether the extension uses vault parameters or not.
        timeout:
          type: integer
          format: int32
        projectIds:
          type: array
          items:
            type: string
      description: An [extension](https://docs.coveo.com/en/206/).
    ExtensionStatisticsModel:
      required:
      - averageDurationInSeconds
      - numberOfErrors
      - numberOfExecutions
      - numberOfSkips
      - numberOfTimeouts
      type: object
      properties:
        averageDurationInSeconds:
          type: number
          description: The average extension execution duration in seconds.
          format: double
        numberOfErrors:
          type: integer
          description: The number of extension executions for which the script returned an error.
          format: int32
        numberOfExecutions:
          type: integer
          description: The total number of executions of the extension.
          format: int32
        numberOfSkips:
          type: integer
          description: The number of times the extension was not executed due to any of the following reasons:<br />- The
            extension condition was evaluated to `false`.<br />- The extension timed out.<br />- The extension was disabled.
          format: int32
        numberOfTimeouts:
          type: integer
          description: The number of executions that reached the maximum execution time (default of 5 seconds).
          format: int32
      description: Execution statistics pertaining to an extension over the past 24 hours (for all items from all sources
        to which the extension applies).
    ExtensionStatusModel:
      required:
      - dailyStatistics
      - disabledStatus
      - durationHealth
      - timeoutHealth
      - timeoutLikeliness
      type: object
      properties:
        durationHealth:
          $ref: '#/components/schemas/ExtensionHealthModel'
        dailyStatistics:
          $ref: '#/components/schemas/ExtensionStatisticsModel'
        disabledStatus:
          $ref: '#/components/schemas/ExtensionDisabledStatusModel'
        timeoutHealth:
          $ref: '#/components/schemas/ExtensionHealthModel'
        timeoutLikeliness:
          type: string
          description: A qualitative indicator of the likelihood that the extension will time out.<br />**Allowed values:**<br
            /> - `NONE`<br /> - `LOW`<br /> - `MEDIUM`<br /> - `HIGH`<br />
          enum:
          - NONE
          - LOW
          - MEDIUM
          - HIGH
        lastAutoDisablingDate:
          type: string
          description: The last date at which the extension was automatically disabled by the service, (in number of milliseconds
            since UNIX epoch).<br />**Example:** `1533916446000`
          format: date-time
        lastDisablingDate:
          type: string
          description: '**Deprecated:** use `lastAutoDisablingDate` instead.'
          format: date-time
          deprecated: true
      description: Status details of an [extension](https://docs.coveo.com/en/206/).
    ExtensionUsedByModel:
      type: object
      properties:
        sourceId:
          type: string
          description: The unique identifier of the source.<br />**Example:** `mycoveocloudv2organizationg8tp8wu3-tqv7hb5wfju45im3lnuvtw2moq`
        sourceName:
          type: string
          description: The name of the [source](https://docs.coveo.com/en/246/).<br />**Example:** `mysource`
      description: A [source](https://docs.coveo.com/en/246/) a given extension applies to.
    ExtensionTimeoutModel:
      type: object
      properties:
        executionTimeout:
          type: integer
          description: Maximum interval in seconds that extension should be executing.
          format: int32
          default: 5
      description: Timeout in seconds that are applicable for extensions.
    DataStreamContentModel:
      required:
      - compressionType
      - id
      - inlineContent
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the data stream. One of `id` or `inlineContent` is required.<br />**Note:**
            Overwrites the `inlineContent` value, if present.
        inlineContent:
          type: string
          description: The data stream content. One of `id` or `inlineContent` is required.<br />**Note:** If an `id` value
            is provided, the `inlineContent` one is ignored.
        compressionType:
          type: string
          description: 'The data stream compression type.<br />**Allowed values:**<br /> - `UNCOMPRESSED`<br /> - `ZLIB`:
            [zlib](https://www.zlib.net/)<br /> - `GZIP`: [gzip](https://www.gzip.org/)<br /> - `LZMA`: [Lempel-Ziv-Markov
            chain algorithm](https://en.wikipedia.org/wiki/Lempel%E2%80%93Ziv%E2%80%93Markov_chain_algorithm)<br />**Default:**
            `UNCOMPRESSED`<br />'
          enum:
          - UNCOMPRESSED
          - ZLIB
          - GZIP
          - LZMA
      description: A [data stream](https://docs.coveo.com/en/2891/) object.<br />**Allowed keys:**<br /> - `BODY_TEXT`<br
        /> - `BODY_HTML`<br /> - `THUMBNAIL`<br /> - `DOCUMENT_DATA`<br />**Example:**`"BODY_TEXT":{"id":"47ce8655-3d0e-43d8-a997-f85fc5ab9e95","compressionType":"UNCOMPRESSED"}<br
        />
    DataStreamValueModel:
      required:
      - values
      type: object
      properties:
        origin:
          type: string
          description: The [origin](https://docs.coveo.com/en/219/) of the set of data streams.<br />**Examples**:<br /> -
            `myTestInput`<br /> - `myExtensionName`
        values:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DataStreamContentModel'
          description: The data streams in the set.
      description: A set of [data streams](https://docs.coveo.com/en/2891/).
    ExtensionTestDocumentModel:
      type: object
      properties:
        id:
          type: string
          description: An identifier for the document.<br />**Example:** `42.29161$https://youtube.com/Playlist:PLSwAY_GuRbl1vrs7nkycdpKpTYbwFj6P2`
        metadata:
          type: array
          description: The document metadata.
          items:
            $ref: '#/components/schemas/MetadataValueModel'
        dataStreams:
          type: array
          description: The sets of [data streams](https://docs.coveo.com/en/2891/).
          items:
            $ref: '#/components/schemas/DataStreamValueModel'
        permissions:
          type: array
          description: The document permissions.
          items:
            $ref: '#/components/schemas/PermissionLevelModel'
      description: A mock document.<br />**Default:** `{"metadata":[],"dataStreams":[],"permissions":[]}`
    ExtensionTestModel:
      type: object
      properties:
        document:
          $ref: '#/components/schemas/ExtensionTestDocumentModel'
        parameters:
          type: object
          additionalProperties:
            type: string
            description: An object containing additional parameters to pass to the tested extension.<br />**Example:** `{"myparam":38}`<br
              />**Default:** `{}`
          description: An object containing additional parameters to pass to the tested extension.<br />**Example:** `{"myparam":38}`<br
            />**Default:** `{}`
        versionId:
          type: string
          description: The unique identifier of the extension version to test.<br />**Example**:`hdJSDb4hTkdnsCynNtF.d657FgLSDydcj`<br
            />By default, the service uses the latest version.
        language:
          type: string
          enum:
          - PYTHON3
      description: A mock document on which to test the extension.
    MetadataValueModel:
      type: object
      properties:
        origin:
          type: string
          description: The [origin](https://docs.coveo.com/en/219/) of the medatada.<br />**Examples**:<br /> - `myTestInput`<br
            /> - `myExtensionName`
        values:
          type: object
          additionalProperties:
            type: object
            description: A metadata key-value store.<br />**Example:** `{"author":["John Cook"], "clickUri":["https://example.recipe.com"],
              "tags":["soup","pasta"], [...]}`
          description: A metadata key-value store.<br />**Example:** `{"author":["John Cook"], "clickUri":["https://example.recipe.com"],
            "tags":["soup","pasta"], [...]}`
      description: Metadata for an [item](https://docs.coveo.com/en/210/).<br />**Default:** `[]`
    PermissionLevelModel:
      type: object
      properties:
        name:
          type: string
        permissionSets:
          type: array
          items:
            $ref: '#/components/schemas/PermissionSetModel'
      description: The document permissions.
    PermissionSetModel:
      type: object
      properties:
        anonymousAllowed:
          type: boolean
