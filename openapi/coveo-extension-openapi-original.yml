          type: string
      - name: extensionId
        in: path
        description: The unique identifier of the extension to test.<br /><b>Example:</b> `mycoveocloudv2organizationg8tp8wu3-vwlyqfbtjkotxqkmrxqjcbcpoy`
        required: true
        schema:
          type: string
      requestBody:
        description: A mock document on which to test the extension.
        content:
