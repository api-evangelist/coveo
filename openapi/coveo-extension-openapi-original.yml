        allowed:
          type: boolean
        identityType:
          type: string
          enum:
          - USER
          - GROUP
          - VIRTUAL_GROUP
          - UNKNOWN
        identity:
          type: string
        securityProvider:
          type: string
        additionalInfo:
          type: object
          additionalProperties:
            type: string
        lastUpdateDate:
          type: string
          format: date-time
        lastUpdateResult:
          type: string
          enum:
          - NONE
          - SUCCESS
          - ACCESS_DENIED
          - TIMED_OUT
          - ENTITY_IS_INVALID
          - ENTITY_IS_UNAVAILABLE
          - SECURITY_PROVIDER_IS_UNAVAILABLE
          - SECURITY_PROVIDER_IS_UNREACHABLE
          - SECURITY_PROVIDER_IS_NOT_READY
          - UNEXPECTED_ERROR
        lastUpdateErrorDetail:
          type: string
        state:
          type: string
          enum:
          - UNKNOWN
          - UP_TO_DATE
          - NOT_UPDATED
          - OUT_OF_DATE
          - IN_ERROR
          - DISABLED
    ExtensionTestDataStreamUriModel:
      required:
      - requiredHeaders
      - streamId
      - uri
