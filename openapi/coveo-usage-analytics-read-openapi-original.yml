components:
  schemas:
    DimensionResponseV14:
      required:
      - apiNames
      - custom
      - displayName
      - eventTypes
      - returnName
      - status
      - type
      type: object
      properties:
        type:
          type: string
          description: The type of the dimension
          enum:
          - TEXT
          - NUMBER
          - SHORT
          - BOOLEAN
          - DATE
          - DATETIME
        displayName:
          type: string
          description: The display name of the dimension
        apiNames:
          uniqueItems: true
          type: array
          description: A collection of possible names to use when querying the statistics service with this dimension
          items:
            type: string
            description: A collection of possible names to use when querying the statistics service with this dimension
        returnName:
          type: string
          description: The name of the dimension when returned by the statistics service
        custom:
          type: boolean
          description: A flag indicating if the dimension is a custom dimension
        availableInVisit:
          type: boolean
          description: Whether the dimension is available in a visit's statistics.
        eventTypes:
          uniqueItems: true
          type: array
          description: Indicates the type of events that this dimension can be attached to.
          items:
            type: string
            description: Indicates the type of events that this dimension can be attached to.
        status:
          type: string
          description: The status of the dimension
          enum:
          - AVAILABLE
          - UPDATING
      description: The details of a dimension
    CustomDimensionModelV15:
      required:
      - displayName
      - type
      type: object
      properties:
        type:
          type: string
          description: The type of the dimension
          enum:
          - TEXT
          - NUMBER
          - SHORT
          - BOOLEAN
          - DATE
          - DATETIME
          - TEXT
          - NUMBER
          - SHORT
          - BOOLEAN
          - DATE
          - DATETIME
        displayName:
          type: string
          description: The display name of the dimension. Should be human readable
        path:
          type: array
          description: 'Strings that correspond to the path that must be followed to fetch the desired value of the dimension
            in the custom_datas map. For example, let''s consider the following custom_datas map: ''{"a":{"b":"c"}}''. To
            select the value "c", the path would need to contain the elements "a" and "b".'
          items:
            type: string
      description: Additional required information to create a custom dimension
    CustomDimensionModelV14:
      required:
      - displayName
      - type
      type: object
      properties:
        type:
          type: string
          description: The type of the dimension
          enum:
          - TEXT
          - NUMBER
          - SHORT
          - BOOLEAN
          - DATE
          - DATETIME
          - TEXT
          - NUMBER
          - SHORT
          - BOOLEAN
          - DATE
          - DATETIME
        displayName:
          type: string
          description: The display name of the dimension Should be human readable
      description: Additional required information to create a custom dimension
    CustomDimensionSuggestionResponseV14:
      type: object
      properties:
        eventName:
          type: string
          description: The event type of the custom dimension
        apiName:
          type: string
          description: The api name of the custom dimension
        values:
          uniqueItems: true
          type: array
          description: The existing values for the custom dimension
          items:
            type: string
            description: The existing values for the custom dimension
      description: Information regarding the custom dimension
    CustomDimensionSuggestionsResponseV14:
      required:
      - suggestions
      type: object
      properties:
        suggestions:
          type: array
          description: Information regarding the custom dimension
          items:
            $ref: '#/components/schemas/CustomDimensionSuggestionResponseV14'
      description: Suggestions of custom dimensions that could be created
    StatusResponse:
      type: object
      description: Service's status information
    DimensionValuesResponseV14:
      type: object
      properties:
        values:
          type: array
          description: The values for this dimension
          items:
            type: object
            additionalProperties:
              type: object
              description: The values for this dimension
            description: The values for this dimension
      description: The values for this dimension
    ExportEstimateResponseV14:
      required:
      - estimates
      type: object
      properties:
        estimates:
          type: object
          additionalProperties:
            type: integer
            description: The estimated number of rows by event
