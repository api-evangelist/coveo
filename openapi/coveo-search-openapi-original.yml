          type: string
          example: '@author ~= "name"'
    KeywordExpressionV2:
      description: Test
      type: object
      required:
      - type
      - value
      properties:
        type:
          type: string
          enum:
          - keyword
          description: An expression to match a literal in an item. The `value` may also be expanded with stemming.
        value:
