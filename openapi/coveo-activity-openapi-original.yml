          description: The [activity](https://docs.coveo.com/en/173/) start date, in number of milliseconds since UNIX epoch.</br>**Example:**
            `1555347453376`
          format: date-time
        endDate:
          type: string
          description: The [activity](https://docs.coveo.com/en/173/) completion date, in number of milliseconds since UNIX
            epoch.</br>**Example:** `1555347453376`
          format: date-time
        duration:
          type: integer
          description: The number of seconds the [activity](https://docs.coveo.com/en/173/) lasted.</br>**Minimum:** `0`
          format: int64
        progress:
          type: number
          description: The percentage/ratio corresponding to the progress of the activity.</br>**Must be in range:** `[0.0,
            1.0]`
          format: double
        triggeredBy:
          $ref: '#/components/schemas/ActivityTriggerByModel'
        organizationId:
          type: string
          description: The unique identifier of the [organization](https://docs.coveo.com/en/185/) the [activity](https://docs.coveo.com/en/173/)
            was retrieved in.</br>**Example:** `mycoveocloudorganizationg8tp8wu3`
        resourceId:
          type: string
          description: The unique identifier of the [resource](https://docs.coveo.com/en/2820/) the [activity](https://docs.coveo.com/en/173/)
            relates to.</br>**Example:** `mycoveocloudorganizationg8tp8wu3-qp2fnx5g7w7voteaiahlxfkf7i`
        resourceName:
          type: string
          description: The name of the [resource](https://docs.coveo.com/en/2820/) the [activity](https://docs.coveo.com/en/173/)
            relates to.</br>**Example:** `sample-extension`
        resourceType:
          type: string
          description: The type of the [resource](https://docs.coveo.com/en/2820/) the [activity](https://docs.coveo.com/en/173/)
            relates to. </br>**Example:** `SECURITY_PROVIDER`
        section:
          type: string
          description: The section of the [Coveo Cloud administration console](https://docs.coveo.com/en/183/) in which the
            [activity](https://docs.coveo.com/en/173/) was executed.
          enum:
          - CONTENT
          - COMMERCE
          - SEARCH
          - ANALYTICS
          - ORGANIZATION
          - PROJECT
          - AI_AND_ML
          - INTERNAL
        snapshotId:
          type: string
          description: The unique identifier for the snapshot. For internal use only.</br>**Example:** `w3mtqdxa0vt65g7p4arhfmlgyu`
        severity:
          type: string
          description: The importance of an [activity](https://docs.coveo.com/en/173/)  </br>**Accepted values:** `INFO`,
            `WARNING`, `ERROR`, `CRITICAL`
          enum:
          - INFO
          - WARNING
          - ERROR
          - CRITICAL
          - UNKNOWN
        resourceDisplayInfo:
          type: string
          description: A short description of the event that occurred.</br>**Example:** `Organization '{orgId}' expired.`
      description: An [activity](https://docs.coveo.com/en/173/).
    ActivityTriggerByModel:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier of the entity that triggered the activity.</br>**Example:** `asmith@example.com-google`
        type:
          type: string
          description: The type of entity that triggered the activity.
          enum:
          - USER
          - SYSTEM
        displayName:
          type: string
          description: The display name of the entity that triggered the activity.</br>**Example:** `asmith@example.com`
        relatedActivityId:
          type: string
          description: The unique identifier of the [activity](https://docs.coveo.com/en/173/) that was triggered.</br>**Example:**
            `128a706128d54btm98df8a98015301be`
        relatedActivity:
          type: string
          description: The [activity](https://docs.coveo.com/en/173/) operation that was triggered.
          enum:
          - APPLY
          - ARCHIVE
          - ARCHIVE_WARNING
          - BACKUP
          - CHANGE_ONLINE
          - CHANGE_READ_ONLY
          - COMMIT
          - CONFIG_CHANGE
          - CONFIG_CREATE
          - CREATE
          - DECLINE
          - DELETE
          - DISABLE
          - DUPLICATE
          - ENABLE
          - ENABLE_DISABLED_ENTITIES
          - EXPORT
          - FULL_REFRESH
          - HORIZONTAL_SCALING
          - IDLE
          - IMPORT
          - INCREMENTAL_REFRESH
          - LIMIT_ALMOST_REACHED
          - LIMIT_EXCEEDED
          - LIMIT_REACHED
          - LOG_REQUEST
          - METADATA_REPORT
          - MODEL_BUILD
          - MODEL_REFRESH
          - ORG_PROVISIONING_CHECK
          - PAUSE
          - PAUSE_ON_ERROR
          - REBUILD
          - REFRESH
          - REFRESH_CANCEL
          - REFRESH_ENTITIES_IN_ERROR
          - REFRESH_ENTITIES_NOT_UPDATED
          - REFRESH_ENTITY
          - REMEDIATE
          - RESIZE
          - RESTORE
          - RESUME
          - ROTATE
          - SCHEDULE_CHANGE
          - SCHEDULE_CREATE
          - SCHEDULE_DELETE
          - SEARCH_CERTIFICATE_UPDATE
          - SEARCH_INCIDENT
          - SEND_RESOURCE_SNAPSHOT
          - START
          - STOP
          - SYNCHRONIZE
          - TEST
          - UPDATE
          - UPGRADE
          - UPGRADE_REVERT
          - VALIDATE
          - VERTICAL_SCALING
        relatedActivityResourceType:
          type: string
          description: The [resource](https://docs.coveo.com/en/2820/) type of the related activity.</br>**Example:** `SUCCESS`
      description: An operation that triggered an [activity](https://docs.coveo.com/en/173/).
    PageModelActivityModel:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ActivityModel'
        totalEntries:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
