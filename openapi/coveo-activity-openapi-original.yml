openapi: 3.0.1
info:
  title: Coveo Activity API
  description: API for Coveo Platform
  termsOfService: https://www.coveo.com/en/support/terms-agreements
  contact:
    name: Coveo
    url: https://connect.coveo.com/s/discussions
  version: 1.0.0
servers:
- url: https://platform.cloud.coveo.com
  description: Coveo public API endpoint
security:
- oauth2:
  - full
paths:
  /rest/organizations/{organizationId}/activities/public:
    post:
      tags:
      - Activities
      summary: List Activities
      description: 'Retrieves a page of [activities](https://docs.coveo.com/en/173/) matching the specified time interval
        and filters in the target [organization](https://docs.coveo.com/en/185/).</br></br>**Required privilege:** Activities
        - View<br /><br /><details><summary>Privilege required</summary>

        ```

        {"owner":"PLATFORM","targetDomain":"ACTIVITIES","type":"VIEW","targetId":"*"}

        ```

        </details>'
      operationId: getAllPublicActivitiesForOrganization
      parameters:
      - name: organizationId
        in: path
        description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
          `mycoveocloudv2organizationg8tp8wu3`
        required: true
        schema:
          type: string
      - name: page
        in: query
        description: The 0-based index number of the page of activities to retrieve.</br>**Minimum:** `0`</br>**Default:**
          `0`
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: perPage
        in: query
        description: The maximum number of activities to list per page.</br>**Minimum:** `0`</br>**Default:** `100`
        required: false
        schema:
          type: integer
          format: int32
          default: 100
      - name: from
        in: query
        description: The beginning of the date range, in [ISO 8601](https://www.w3.org/TR/NOTE-datetime) format, for which
          to list activities. If not specified, the parameter will be set as the current date and time.</br>The end range
          must be within 31 days of the beginning range.</br>**Example:** `2018-05-22T23:36:30.589Z`
        required: false
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        description: The end of the date range, in [ISO 8601](https://www.w3.org/TR/NOTE-datetime) format, for which to list
          activities.</br>The end range must be within 31 days of the beginning range.</br>**Example:** `2018-05-23T23:36:30.589Z`
        required: false
        schema:
          type: string
          format: date-time
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityFacetModel'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PageModelActivityModel'
      x-pretty-name: getAllPublicActivitiesForOrganization
      x-required-privilege:
        owner: PLATFORM
        targetDomain: ACTIVITIES
        type: VIEW
        targetId: '*'
      x-required-privileges:
      - owner: PLATFORM
        targetDomain: ACTIVITIES
        type: VIEW
        targetId: '*'
      x-ui-operation-id: /rest/organizations/paramId/activities/public_post
  /rest/organizations/{organizationId}/activities/latest:
    post:
      tags:
      - Activities
      summary: Get Latest Activities for a Resource ID of an Organization Based on a Facet Model.
      description: '<details><summary>Privilege required</summary>

        ```

        {"owner":"PLATFORM","targetDomain":"ACTIVITIES","type":"VIEW","targetId":"*"}

        ```

        </details>'
      operationId: getLatestActivitiesForOrganization
      parameters:
      - name: organizationId
        in: path
        description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
          `mycoveocloudv2organizationg8tp8wu3`
        required: true
        schema:
          type: string
      - name: page
        in: query
        description: The 0-based index number of the page of activities to retrieve.</br>**Minimum:** `0`</br>**Default:**
          `0`
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: perPage
        in: query
        description: The maximum number of activities to list per page.</br>**Minimum:** `0`</br>**Default:** `100`
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityFacetModel'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PageModelActivityModel'
      x-pretty-name: getLatestActivitiesForOrganization
      x-required-privilege:
        owner: PLATFORM
        targetDomain: ACTIVITIES
        type: VIEW
        targetId: '*'
      x-required-privileges:
      - owner: PLATFORM
        targetDomain: ACTIVITIES
        type: VIEW
        targetId: '*'
      x-ui-operation-id: /rest/organizations/paramId/activities/latest_post
  /rest/organizations/{organizationId}/activities/facets/public:
    post:
      tags:
      - Activities
      summary: List Activity Facets
      description: 'Lists [activity](https://docs.coveo.com/en/173/) facets matching the specified time interval and filters
        in a [Coveo Cloud organization](https://docs.coveo.com/en/185/).</br></br>**Required privilege:** Activities - View<br
        /><br /><details><summary>Privilege required</summary>

        ```

        {"owner":"PLATFORM","targetDomain":"ACTIVITIES","type":"VIEW","targetId":"*"}

        ```

        </details>'
      operationId: getPublicActivitiesFacetsForOrganization
      parameters:
      - name: organizationId
        in: path
        description: The unique identifier of the target [organization](https://docs.coveo.com/en/185/).<br />**Example:**
          `mycoveocloudv2organizationg8tp8wu3`
        required: true
        schema:
          type: string
      - name: from
        in: query
        description: The beginning of the date range, in [ISO 8601](https://www.w3.org/TR/NOTE-datetime) format, for which
          to list [activity](https://docs.coveo.com/en/173/) facets. If not specified, the parameter will be set as the current
          date and time.
        required: false
        schema:
          type: string
          format: date-time
      - name: to
        in: query
        description: The end of the date range, in [ISO 8601](https://www.w3.org/TR/NOTE-datetime) format, for which to list
          [activity](https://docs.coveo.com/en/173/) facets.</br>The end range must be within 31 days of the beginning range.</br>**Example:**
          `2018-05-23T23:36:30.589Z`
        required: false
        schema:
          type: string
          format: date-time
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityFacetModel'
        required: true
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ActivityFacetModel'
      x-pretty-name: getPublicActivitiesFacetsForOrganization
      x-required-privilege:
        owner: PLATFORM
        targetDomain: ACTIVITIES
        type: VIEW
        targetId: '*'
      x-required-privileges:
      - owner: PLATFORM
        targetDomain: ACTIVITIES
        type: VIEW
        targetId: '*'
      x-ui-operation-id: /rest/organizations/paramId/activities/facets/public_post
  /rest/organizations/{organizationId}/activities/{activityId}:
    get:
      tags:
      - Activities
      summary: Show Activity
